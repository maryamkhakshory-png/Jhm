<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🔧 جعبه ابزار حرفه‌ای</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.0/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --accent: #6c5ce7;
            --accent-light: #a855f7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00b894;
            --danger: #ff6b6b;
            --warning: #fdcb6e;
            --info: #74b9ff;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            line-height: 1.6;
            touch-action: manipulation;
        }

        ::-webkit-scrollbar { width: 0; height: 0; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding: 0 10px 30px;
        }

        .page {
            display: none;
            animation: fadeInScale 0.35s ease;
            padding-bottom: 20px;
        }
        .page.active { display: block; }

        /* هدر */
        .app-header {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin: 16px 0;
            text-align: center;
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.5s ease;
        }
        .app-header .logo { font-size: 48px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
        .app-header h1 {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 4px;
        }
        .app-header .subtitle { font-size: 13px; color: var(--text-secondary); opacity: 0.8; }

        /* تولبار */
        .toolbar {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--glass-shadow);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .toolbar .back-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--accent); border: none; color: white;
            font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); flex-shrink: 0;
        }
        .toolbar .back-btn:active { transform: scale(0.9); }
        .toolbar .tool-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }

        /* جستجو */
        .search-bar { margin: 12px 0; }
        .search-bar input {
            width: 100%; padding: 14px 20px;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl);
            color: var(--text-primary); font-size: 15px; outline: none; transition: var(--transition);
        }
        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .search-bar input::placeholder { color: var(--text-secondary); }

        /* دسته‌بندی */
        .categories { display: flex; gap: 8px; margin: 12px 0; overflow-x: auto; padding: 4px 0; }
        .categories::-webkit-scrollbar { height: 0; }
        .cat-btn {
            padding: 10px 18px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); backdrop-filter: blur(10px);
            color: var(--text-secondary); border-radius: var(--radius-xl);
            cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 500; transition: var(--transition);
        }
        .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 15px var(--accent-glow); }
        .cat-btn:active { transform: scale(0.95); }

        /* استات */
        .stats-row { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .stat-chip {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl);
            padding: 8px 14px; font-size: 12px; color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
        }

        /* شبکه ابزارها */
        .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 16px 0; }
        .tool-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            padding: 20px 14px; text-align: center; cursor: pointer;
            transition: var(--transition); animation: fadeInUp 0.5s ease backwards;
            position: relative;
        }
        .tool-card:active { transform: scale(0.95); border-color: var(--accent); }
        .tool-card .tool-icon { font-size: 36px; margin-bottom: 10px; }
        .tool-card .tool-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .tool-card .tool-desc { font-size: 11px; color: var(--text-secondary); }

        /* دکمه‌ها */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
            cursor: pointer; font-size: 14px; font-weight: 600; margin: 6px 0;
            transition: var(--transition); display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-success { background: linear-gradient(135deg, #00b894, #00cec9); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; display: inline-flex; }

        /* فرم‌ها */
        .input-group { margin: 12px 0; }
        .input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 12px 16px;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            color: var(--text-primary); font-size: 14px; outline: none; transition: var(--transition);
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow);
        }

        /* رنج */
        .range-group { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
        .range-group input[type="range"] {
            flex: 1; height: 6px; border-radius: 3px;
            background: var(--glass-border); outline: none; -webkit-appearance: none;
        }
        .range-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .range-group .range-value { min-width: 50px; text-align: center; font-weight: 600; font-size: 14px; }

        /* پیش‌نمایش */
        .preview-container {
            background: rgba(0,0,0,0.3); border: 2px dashed var(--glass-border);
            border-radius: var(--radius-md); padding: 16px; margin: 12px 0;
            min-height: 100px; display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; align-items: center; max-height: 300px; overflow-y: auto;
        }
        .preview-container img { height: 80px; border-radius: 8px; border: 2px solid var(--glass-border); object-fit: cover; }

        /* مقایسه */
        .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
        .comparison-item { text-align: center; }
        .comparison-item img { width: 100%; border-radius: var(--radius-md); border: 2px solid var(--glass-border); }
        .comparison-item .label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

        /* Progress */
        .progress-bar { width: 100%; height: 6px; background: var(--glass-border); border-radius: 3px; margin: 12px 0; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 13px; color: var(--text-secondary); text-align: center; margin: 4px 0; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); color: white;
            padding: 14px 24px; border-radius: var(--radius-xl); font-size: 14px;
            z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* رنگ */
        .color-grid { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: var(--transition); }
        .color-dot.active { border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* Canvas wrapper */
        .canvas-wrapper {
            position: relative; overflow: hidden;
            border-radius: var(--radius-md); border: 2px solid var(--glass-border);
            margin: 10px 0; cursor: grab; touch-action: none;
            background: #1a1a1a;
        }
        .canvas-wrapper:active { cursor: grabbing; }
        .canvas-wrapper canvas { display: block; transform-origin: 0 0; }

        /* مدال */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 9000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: var(--bg-secondary); border-radius: var(--radius-lg);
            padding: 24px; max-width: 90%; max-height: 80vh; overflow-y: auto;
        }

        /* تنظیمات */
        .settings-section {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            padding: 16px; margin: 10px 0;
        }
        .settings-section h3 { font-size: 15px; margin-bottom: 10px; color: var(--accent); }

        /* چک باکس */
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        @media (max-width: 360px) {
            .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .tool-card { padding: 14px 10px; }
            .tool-card .tool-icon { font-size: 28px; }
            .app-header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- صفحه اصلی -->
        <div class="page active" id="page-home">
            <header class="app-header">
                <div class="logo">🔧</div>
                <h1>جعبه ابزار حرفه‌ای</h1>
                <p class="subtitle">۱۵ ابزار قدرتمند پردازش تصویر</p>
            </header>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 جستجوی ابزار..." oninput="filterTools()">
            </div>

            <div class="categories" id="categories">
                <button class="cat-btn active" data-cat="all" onclick="filterByCategory('all', this)">همه</button>
                <button class="cat-btn" data-cat="image" onclick="filterByCategory('image', this)">تصویر</button>
                <button class="cat-btn" data-cat="pdf" onclick="filterByCategory('pdf', this)">PDF</button>
                <button class="cat-btn" data-cat="qr" onclick="filterByCategory('qr', this)">QR</button>
                <button class="cat-btn" data-cat="utility" onclick="filterByCategory('utility', this)">ابزارها</button>
            </div>

            <div class="stats-row">
                <div class="stat-chip">🕐 اخیراً: <span id="recentTool">-</span></div>
                <div class="stat-chip">📊 استفاده: <span id="usageCount">0</span></div>
                <div class="stat-chip" onclick="openSettings()" style="cursor:pointer;">⚙️ تنظیمات</div>
            </div>

            <div class="tools-grid" id="toolsGrid"></div>
        </div>

        <!-- صفحه ابزار -->
        <div class="page" id="page-tool"></div>
        
        <!-- صفحه تنظیمات -->
        <div class="page" id="page-settings"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- مدال -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <h3 style="text-align:center;margin-bottom:15px;">📷 اسکن QR</h3>
            <video id="qrVideo" style="width:100%;border-radius:10px;" autoplay playsinline></video>
            <div id="qrModalResult" style="text-align:center;margin:10px 0;"></div>
            <button class="btn btn-danger" onclick="stopQR()">❌ بستن</button>
        </div>
    </div>

    <div class="modal-overlay" id="colorZoomModal">
        <div class="modal-content" style="text-align:center;">
            <h3>🔍 زوم رنگ</h3>
            <canvas id="colorZoomCanvas" style="max-width:100%;border-radius:10px;"></canvas>
            <p id="colorZoomInfo" style="margin:10px 0;"></p>
            <button class="btn btn-outline" onclick="document.getElementById('colorZoomModal').classList.remove('show')">بستن</button>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script>
    // ============================================
    // پیکربندی و حالت
    // ============================================
    const CONFIG = {
        saveFolder: localStorage.getItem('tb_save_folder') || 'Download',
        theme: localStorage.getItem('tb_theme') || 'dark',
        quality: parseInt(localStorage.getItem('tb_quality') || '90'),
    };

    const toolsData = [
        { id: 1, name: '🧩 چسباندن عکس', desc: 'عمودی و افقی', category: 'image', action: 'stitch' },
        { id: 2, name: '📄 ساخت PDF', desc: 'تصاویر به PDF', category: 'pdf', action: 'pdf' },
        { id: 3, name: '🧹 پاک‌کن عکس', desc: 'حذف متن + زوم', category: 'image', action: 'cleaner' },
        { id: 4, name: '✨ بهبود کیفیت', desc: 'نور، رنگ، شارپنس', category: 'image', action: 'enhancer' },
        { id: 5, name: '✂️ تقسیم عکس', desc: 'برش تصاویر بلند', category: 'image', action: 'split' },
        { id: 6, name: '💧 واترمارک', desc: 'متن و لوگو', category: 'image', action: 'watermark' },
        { id: 7, name: '📦 فشرده‌سازی', desc: 'کاهش حجم + مقایسه', category: 'image', action: 'compressor' },
        { id: 8, name: '🔄 تبدیل فرمت', desc: 'JPG ↔ PNG ↔ WEBP', category: 'image', action: 'converter' },
        { id: 9, name: '📐 تغییر سایز', desc: 'ابعاد دلخواه', category: 'image', action: 'resize' },
        { id: 10, name: '📱 ساخت QR', desc: 'متن/لینک/تلفن/ایمیل', category: 'qr', action: 'qrgen' },
        { id: 11, name: '📷 اسکن QR', desc: 'دوربین + عکس', category: 'qr', action: 'qrscan' },
        { id: 12, name: '📝 OCR', desc: 'متن فارسی + انگلیسی', category: 'utility', action: 'ocr' },
        { id: 13, name: '🎨 انتخاب رنگ', desc: 'HEX/RGB/HSL + زوم', category: 'utility', action: 'colorpick' },
        { id: 14, name: '🖼️ چسب اسکرین', desc: 'حذف همپوشانی', category: 'image', action: 'screenstitch' },
        { id: 15, name: '📋 پردازش گروهی', desc: 'فشرده/سایز/واترمارک', category: 'utility', action: 'batch' }
    ];

    const state = {
        currentPage: 'home', currentTool: null, history: ['home'],
        usageStats: JSON.parse(localStorage.getItem('tb_stats') || '{}'),
        recentTools: JSON.parse(localStorage.getItem('tb_recent') || '[]')
    };

    // ============================================
    // ذخیره فایل (چند روش)
    // ============================================
    function saveFile(dataUrl, filename, mime = 'image/jpeg') {
        const folder = CONFIG.saveFolder;
        const fullPath = folder + '/' + filename;
        
        // روش ۱: Median Bridge
        if (typeof median !== 'undefined' && median.file && median.file.save) {
            try {
                median.file.save({ data: dataUrl, filename: filename, folder: folder });
                showToast('💾 ذخیره شد');
                return;
            } catch(e) { console.log('Median failed'); }
        }
        
        // روش ۲: Cordova FileSystem
        if (typeof cordova !== 'undefined' && window.requestFileSystem && window.LocalFileSystem) {
            try {
                window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, (fs) => {
                    // ایجاد پوشه اگر وجود ندارد
                    fs.root.getDirectory(folder, { create: true }, (dirEntry) => {
                        dirEntry.getFile(filename, { create: true, exclusive: false }, (fileEntry) => {
                            fileEntry.createWriter((writer) => {
                                writer.onwriteend = () => {
                                    if (window.MediaScanner) {
                                        window.MediaScanner.scanFile(fileEntry.toURL(), mime, () => showToast('💾 ذخیره شد'));
                                    } else {
                                        showToast('💾 ذخیره شد');
                                    }
                                };
                                fetch(dataUrl).then(r => r.blob()).then(blob => writer.write(blob));
                            });
                        });
                    });
                });
                return;
            } catch(e) { console.log('Cordova FS failed'); }
        }
        
        // روش ۳: دانلود مستقیم
        try {
            const link = document.createElement('a');
            link.href = dataUrl; link.download = filename;
            document.body.appendChild(link); link.click();
            setTimeout(() => document.body.removeChild(link), 100);
            showToast('💾 فایل ذخیره شد');
            return;
        } catch(e) {}
        
        // روش ۴: Blob URL
        fetch(dataUrl).then(r => r.blob()).then(blob => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = filename;
            document.body.appendChild(link); link.click();
            document.body.removeChild(link); URL.revokeObjectURL(url);
            showToast('💾 فایل ذخیره شد');
        });
    }

    function saveBlob(blob, filename) {
        const folder = CONFIG.saveFolder;
        if (typeof median !== 'undefined' && median.file && median.file.save) {
            const reader = new FileReader();
            reader.onload = () => { median.file.save({ data: reader.result, filename, folder }); showToast('💾 ذخیره شد'); };
            reader.readAsDataURL(blob);
            return;
        }
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = filename;
        document.body.appendChild(link); link.click();
        document.body.removeChild(link); URL.revokeObjectURL(url);
        showToast('💾 فایل ذخیره شد');
    }

    // ============================================
    // توابع کمکی
    // ============================================
    function showToast(msg, dur = 3000) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        clearTimeout(window._tt); window._tt = setTimeout(() => t.classList.remove('show'), dur);
    }

    function loadImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve({ img, dataUrl: e.target.result });
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function fileInput(accept = 'image/*', multiple = false) {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = accept; inp.multiple = multiple;
        inp.style.cssText = 'position:fixed;top:-100px;left:-100px;';
        document.body.appendChild(inp);
        setTimeout(() => document.body.removeChild(inp), 60000);
        return inp;
    }

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function dataUrlToBlob(dataUrl) {
        const parts = dataUrl.split(',');
        const mime = parts[0].match(/:(.*?);/)[1];
        const bytes = atob(parts[1]);
        const ab = new ArrayBuffer(bytes.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < bytes.length; i++) ia[i] = bytes.charCodeAt(i);
        return new Blob([ab], { type: mime });
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                case g: h = ((b - r) / d + 2) / 6; break;
                case b: h = ((r - g) / d + 4) / 6; break;
            }
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function init() {
        renderTools();

        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page === 'tool') navigateTo('tool', e.state.toolId, false);
            else if (e.state && e.state.page === 'settings') navigateTo('settings', null, false);
            else navigateTo('home', null, false);
        });
        document.addEventListener('backbutton', handleBack, false);
    }

    function navigateTo(page, toolId, pushState) {
        state.currentPage = page;
        state.currentTool = toolId;
        if (pushState) {
            state.history.push(page);
            window.history.pushState({ page, toolId }, '');
        }
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        
        if (page === 'home') {
            document.getElementById('page-home').classList.add('active');
            updateStats();
        } else if (page === 'tool' && toolId) {
            document.getElementById('page-tool').classList.add('active');
            renderTool(toolId);
        } else if (page === 'settings') {
            document.getElementById('page-settings').classList.add('active');
            renderSettings();
        }
        window.scrollTo(0, 0);
    }

    function goBack() {
        if (state.history.length > 1) {
            state.history.pop();
            const prev = state.history[state.history.length - 1];
            if (prev === 'home') navigateTo('home', null, false);
            else if (prev === 'settings') navigateTo('settings', null, false);
            else navigateTo('tool', state.currentTool, false);
        } else {
            if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
        }
    }

    function handleBack() {
        if (state.currentPage === 'home') {
            if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
        } else goBack();
    }

    function stitch() {
        let files = [], mode = 'vertical', resultDataUrl = null;
        
        document.getElementById('toolContent').innerHTML = `
            <div class="input-group"><label>حالت:</label>
                <div class="grid-2">
                    <button class="btn btn-primary btn-sm active" id="smV" onclick="setMode('vertical')">📐 عمودی</button>
                    <button class="btn btn-outline btn-sm" id="smH" onclick="setMode('horizontal')">📏 افقی</button>
                </div>
            </div>
            <div class="range-group"><span>کیفیت:</span><input type="range" id="sQual" min="10" max="100" value="${CONFIG.quality}" oninput="document.getElementById('sQualV').textContent=this.value+'%'"><span class="range-value" id="sQualV">${CONFIG.quality}%</span></div>
            <div class="preview-container" id="sPreview"><span style="color:var(--text-secondary)">تصویری انتخاب نشده</span></div>
            <button class="btn btn-primary" onclick="selSFiles()">📂 انتخاب تصاویر</button>
            <button class="btn btn-success" id="sBtn" disabled onclick="doStitch()">✂️ چسباندن</button>
            <div id="sResult"></div>
            <button class="btn btn-outline" id="sSave" disabled onclick="saveFile(window._stitchResult, 'stitched_'+Date.now()+'.jpg')">💾 ذخیره</button>
        `;
        
        window.setMode = (m) => {
            mode = m;
            document.getElementById('smV').className = m === 'vertical' ? 'btn btn-primary btn-sm active' : 'btn btn-outline btn-sm';
            document.getElementById('smH').className = m === 'horizontal' ? 'btn btn-primary btn-sm active' : 'btn btn-outline btn-sm';
        };
        
        window.selSFiles = () => {
            const inp = fileInput('image/*', true);
            inp.onchange = (e) => {
                files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                if (!files.length) return;
                const prev = document.getElementById('sPreview');
                prev.innerHTML = '';
                files.forEach((f, i) => {
                    const r = new FileReader();
                    r.onload = (ev) => { prev.innerHTML += `<img src="${ev.target.result}" style="height:70px;" onclick="this.remove();files.splice(${i},1)">`; };
                    r.readAsDataURL(f);
                });
                document.getElementById('sBtn').disabled = false;
            };
            inp.click();
        };
        
        window.doStitch = async () => {
            const btn = document.getElementById('sBtn'); btn.disabled = true;
            const qual = parseInt(document.getElementById('sQual').value) / 100;
            const imgs = [];
            for (let f of files) { const { img } = await loadImage(f); imgs.push(img); }
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            if (mode === 'vertical') {
                let mw = 0, th = 0;
                imgs.forEach(i => { if (i.width > mw) mw = i.width; th += i.height; });
                canvas.width = mw; canvas.height = th;
                ctx.fillStyle = '#FFF'; ctx.fillRect(0, 0, mw, th);
                let y = 0; imgs.forEach(i => { ctx.drawImage(i, (mw-i.width)/2, y); y += i.height; });
            } else {
                let mh = 0, tw = 0;
                imgs.forEach(i => { if (i.height > mh) mh = i.height; tw += i.width; });
                canvas.width = tw; canvas.height = mh;
                ctx.fillStyle = '#FFF'; ctx.fillRect(0, 0, tw, mh);
                let x = 0; imgs.forEach(i => { ctx.drawImage(i, x, (mh-i.height)/2); x += i.width; });
            }
            
            window._stitchResult = canvas.toDataURL('image/jpeg', qual);
            document.getElementById('sResult').innerHTML = `<p style="color:var(--success);text-align:center;">✅ انجام شد</p><img src="${window._stitchResult}" style="width:100%;border-radius:10px;">`;
            document.getElementById('sSave').disabled = false;
            btn.disabled = false;
        };
    }

    function pdf() {
        let files = [];
        document.getElementById('toolContent').innerHTML = `
            <div class="input-group"><label>اندازه:</label><select id="pdfSize"><option value="a4">A4</option><option value="a5">A5</option><option value="letter">Letter</option></select></div>

            <button class="btn btn-outline" id="pSave" disabled onclick="saveFile(window._pdfDataUrl, 'doc_'+Date.now()+'.pdf','application/pdf')">💾 ذخیره</button>
        `;
        
        window.selPFiles = () => {
            const inp = fileInput('image/*', true);
            inp.onchange = (e) => {
                files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                if (!files.length) return;
                const prev = document.getElementById('pPreview');
                prev.innerHTML = '';
                files.forEach((f, i) => {
                    const r = new FileReader();
                    r.onload = (ev) => { prev.innerHTML += `<img src="${ev.target.result}" style="height:70px;" onclick="this.remove();files.splice(${i},1)">`; };
                    r.readAsDataURL(f);
                });
                document.getElementById('pBtn').disabled = false;
            };
            inp.click();
        };
        
        window.doPDF = async () => {
            const btn = document.getElementById('pBtn'); btn.disabled = true;
            const { jsPDF } = window.jspdf;
            const sizes = { a4: [210,297], a5: [148,210], letter: [216,279] };
            const [pw, ph] = sizes[document.getElementById('pdfSize').value];
            const pdf = new jsPDF('p', 'mm', [pw, ph]);
            
            for (let i = 0; i < files.length; i++) {
                if (i > 0) pdf.addPage();
                const { img, dataUrl } = await loadImage(files[i]);
                const m = 10; let iw = pw - m*2, ih = (img.height/img.width) * iw;
                if (ih > ph - m*2) { ih = ph - m*2; iw = (img.width/img.height) * ih; }
                pdf.addImage(dataUrl, 'JPEG', (pw-iw)/2, (ph-ih)/2, iw, ih);
            }
            
            window._pdfDataUrl = pdf.output('datauristring');
            document.getElementById('pResult').innerHTML = '<p style="color:var(--success);text-align:center;">✅ PDF آماده</p>';
            document.getElementById('pSave').disabled = false;
            btn.disabled = false;
        };
    }

        // ============================================
    // ابزار ۳: پاک‌کن عکس (زوم، پان، Undo/Redo)
    // ============================================
    function cleaner() {
        let cImg = null, brushSize = 20, brushColor = '#FFFFFF';
        let scale = 1, panX = 0, panY = 0, isDrawing = false, isPanning = false;
        let lastDist = 0, lastX = 0, lastY = 0;
        let history = [], historyIndex = -1;
        let canvas, ctx, wrapper;
        
        document.getElementById('toolContent').innerHTML = `
            <div class="range-group"><span>سایز قلم:</span><input type="range" id="cSize" min="3" max="80" value="20" oninput="brushSize=parseInt(this.value);document.getElementById('cSizeV').textContent=this.value"><span class="range-value" id="cSizeV">20</span></div>
            
            <div class="color-grid">
                <div class="color-dot active" style="background:#FFFFFF" data-color="#FFFFFF" onclick="selColor(this)"></div>
                <div class="color-dot" style="background:#000000" data-color="#000000" onclick="selColor(this)"></div>
                <div class="color-dot" style="background:#808080" data-color="#808080" onclick="selColor(this)"></div>
                <div class="color-dot" style="background:#F5DEB3" data-color="#F5DEB3" onclick="selColor(this)"></div>
                <div class="color-dot" style="background:#E8E8E8" data-color="#E8E8E8" onclick="selColor(this)"></div>
                <div class="color-dot" style="background:#C8E6C9" data-color="#C8E6C9" onclick="selColor(this)"></div>
            </div>
            
            <div class="grid-3">
                <button class="btn btn-outline btn-sm" onclick="zoomIn()">🔍 +</button>
                <button class="btn btn-outline btn-sm" onclick="zoomOut()">🔍 −</button>
                <button class="btn btn-outline btn-sm" onclick="resetView()">🔄 ریست</button>
            </div>
            <p style="text-align:center;font-size:11px;color:var(--text-secondary);">💡 دو انگشت = زوم و جابجایی | یک انگشت = پاک کردن</p>
            
            <div class="canvas-wrapper" id="cWrapper" style="height:400px;">
                <canvas id="cCanvas" style="display:none;"></canvas>
            </div>
            
            <div class="grid-3">
                <button class="btn btn-outline btn-sm" id="cUndo" disabled onclick="undo()">↩️ بازگشت</button>
                <button class="btn btn-outline btn-sm" id="cRedo" disabled onclick="redo()">↪️ بعدی</button>
                <button class="btn btn-outline btn-sm" id="cSave" disabled onclick="saveCleaned()">💾 ذخیره</button>
            </div>
            
            <button class="btn btn-primary" onclick="selCImage()">📂 انتخاب عکس</button>
        `;
        
        canvas = document.getElementById('cCanvas');
        ctx = canvas.getContext('2d');
        wrapper = document.getElementById('cWrapper');
        
        window.selColor = (dot) => {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            brushColor = dot.dataset.color;
        };
        
        window.selCImage = () => {
            const inp = fileInput();
            inp.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        cImg = img;
                        canvas.style.display = 'block';
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        history = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
                        historyIndex = 0;
                        document.getElementById('cSave').disabled = false;
                        document.getElementById('cUndo').disabled = false;
                        updateTransform();
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            inp.click();
        };
        
        function updateTransform() {
            canvas.style.transform = `scale(${scale}) translate(${panX}px, ${panY}px)`;
        }
        
        window.zoomIn = () => { scale = Math.min(5, scale + 0.2); updateTransform(); };
        window.zoomOut = () => { scale = Math.max(0.2, scale - 0.2); updateTransform(); };
        window.resetView = () => { scale = 1; panX = 0; panY = 0; updateTransform(); };
        
        function getPos(e) {
            const rect = wrapper.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (cx - rect.left) / scale - panX,
                y: (cy - rect.top) / scale - panY
            };
        }
        
        wrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPanning = true;
                lastX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                lastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            } else if (e.touches.length === 1) {
                isDrawing = true;
                drawAt(e.touches[0]);
            }
            e.preventDefault();
        }, { passive: false });
        
        wrapper.addEventListener('touchmove', (e) => {
            if (isPanning && e.touches.length === 2) {
                const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                
                panX += (cx - lastX) / scale;
                panY += (cy - lastY) / scale;
                if (lastDist > 0) scale *= dist / lastDist;
                scale = Math.min(5, Math.max(0.2, scale));
                
                lastX = cx; lastY = cy; lastDist = dist;
                updateTransform();
            } else if (isDrawing && e.touches.length === 1) {
                drawAt(e.touches[0]);
            }
            e.preventDefault();
        }, { passive: false });
        
        wrapper.addEventListener('touchend', () => {
            if (isDrawing) { saveState(); isDrawing = false; }
            isPanning = false; lastDist = 0;
        });
        
        function drawAt(touch) {
            if (!cImg) return;
            const pos = getPos(touch);
            ctx.fillStyle = brushColor;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, brushSize / 2 / scale, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function saveState() {
            history = history.slice(0, historyIndex + 1);
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            historyIndex++;
            if (history.length > 30) { history.shift(); historyIndex--; }
            document.getElementById('cRedo').disabled = true;
            document.getElementById('cUndo').disabled = false;
        }
        
        window.undo = () => {
            if (historyIndex > 0) {
                historyIndex--;
                ctx.putImageData(history[historyIndex], 0, 0);
                document.getElementById('cRedo').disabled = false;
                if (historyIndex === 0) document.getElementById('cUndo').disabled = true;
            }
        };
        
        window.redo = () => {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                ctx.putImageData(history[historyIndex], 0, 0);
                document.getElementById('cUndo').disabled = false;
                if (historyIndex >= history.length - 1) document.getElementById('cRedo').disabled = true;
            }
        };
        
        window.saveCleaned = () => {
            if (!canvas) return;
            saveFile(canvas.toDataURL('image/jpeg', CONFIG.quality / 100), 'cleaned_' + Date.now() + '.jpg');
        };
    }

        document.getElementById('toolContent').innerHTML = `

            <button class="btn btn-primary" onclick="selEFile()">📂 انتخاب عکس</button>
            <button class="btn btn-success" id="eBtn" disabled onclick="doEnhance()">✨ اعمال</button>
            
            <div id="eResult"></div>
            <button class="btn btn-outline" id="eSave" disabled onclick="saveFile(window._eResult, 'enhanced_'+Date.now()+'.jpg')">💾 ذخیره</button>
        `;
        
        window.selEFile = () => {
            const inp = fileInput();
            inp.onchange = (e) => {
                eFile = e.target.files[0];
                if (!eFile) return;
                const reader = new FileReader();
                reader.onload = (ev) => { document.getElementById('ePreview').innerHTML = `<img src="${ev.target.result}" style="max-width:100%;max-height:200px;border-radius:10px;">`; };
                reader.readAsDataURL(eFile);
                document.getElementById('eBtn').disabled = false;
            };
            inp.click();
        };
        
        window.doEnhance = async () => {
            const btn = document.getElementById('eBtn'); btn.disabled = true;
            const { img } = await loadImage(eFile);
            const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const b = parseInt(document.getElementById('eBright').value) / 100;
            const c = parseInt(document.getElementById('eContrast').value) / 100;
            const s = parseInt(document.getElementById('eSaturate').value) / 100;
            const sh = parseInt(document.getElementById('eSharpen').value) / 100;
            
            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.min(255, data[i] * b);
                data[i+1] = Math.min(255, data[i+1] * b);
                data[i+2] = Math.min(255, data[i+2] * b);
                
                for (let j = 0; j < 3; j++) {
                    data[i+j] = ((data[i+j]/255 - 0.5) * c + 0.5) * 255;
                    data[i+j] = Math.max(0, Math.min(255, data[i+j]));
                }
                
                const g = 0.2989*data[i] + 0.5870*data[i+1] + 0.1140*data[i+2];
                data[i] = Math.min(255, g + s*(data[i] - g));
                data[i+1] = Math.min(255, g + s*(data[i+1] - g));
                data[i+2] = Math.min(255, g + s*(data[i+2] - g));
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Sharpen
            if (sh > 0) {
                const kernel = [0, -sh, 0, -sh, 1 + 4*sh, -sh, 0, -sh, 0];
                const sharpData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                // Simplified sharpen
                ctx.putImageData(sharpData, 0, 0);
            }
            
            window._eResult = canvas.toDataURL('image/jpeg', CONFIG.quality / 100);
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('eResult').innerHTML = `
                    <div class="comparison">
                        <div class="comparison-item"><img src="${ev.target.result}"><div class="label">📷 قبل</div></div>
                        <div class="comparison-item"><img src="${window._eResult}"><div class="label">✨ بعد</div></div>
                    </div>`;
            };
            reader.readAsDataURL(eFile);
            
            document.getElementById('eSave').disabled = false;
            btn.disabled = false;
        };
    }

            document.getElementById('qrContent').placeholder = placeholders[type] || '';
        };
        updateQRPlaceholder();
        
        window.genQR = () => {
            const type = document.getElementById('qrType').value;
            let content = document.getElementById('qrContent').value.trim();
            if (!content) { showToast('⚠️ محتوا را وارد کن'); return; }
            
            // افزودن پیشوند بر اساس نوع

            const fg = document.getElementById('qrFG').value;
            const bg = document.getElementById('qrBG').value;

            const canvas = document.createElement('canvas');
            QRCode.toCanvas(canvas, content, {

            }, (err) => {
                if (err) { showToast('❌ خطا در تولید QR'); return; }
                document.getElementById('qrGenResult').innerHTML = '';
                document.getElementById('qrGenResult').appendChild(canvas);
                window._qrData = canvas.toDataURL('image/png');
                document.getElementById('qrSave').disabled = false;

    function ocr() {
        document.getElementById('toolContent').innerHTML = `
            <button class="btn btn-primary" onclick="selOCR()">📂 انتخاب عکس</button>
            <div class="progress-bar" id="ocrProgress" style="display:none;"><div class="fill" style="width:0%"></div></div>

            <div id="ocrResult" style="margin:15px 0;"></div>

                <button class="btn btn-outline btn-sm" id="ocrCopy" disabled onclick="copyOCR()">📋 کپی متن</button>

            </div>
        `;
        
        window.selOCR = () => {
            const inp = fileInput();
            inp.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                document.getElementById('ocrProgress').style.display = 'block';
                document.getElementById('ocrProgressText').style.display = 'block';
                
                try {
                    const worker = await Tesseract.createWorker();
                    await worker.loadLanguage('eng+fas');
                    await worker.initialize('eng+fas');
                    
                    const result = await worker.recognize(file);
                    const text = result.data.text.trim() || 'متنی پیدا نشد';
                    
                    await worker.terminate();
                    
                    document.getElementById('ocrResult').innerHTML = `
                        <textarea id="ocrTextArea" style="width:100%;min-height:200px;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);border-radius:10px;padding:15px;font-size:14px;resize:vertical;">${text}</textarea>`;
                    
                    window._ocrText = text;
                    document.getElementById('ocrCopy').disabled = false;
                    document.getElementById('ocrSave').disabled = false;
                    document.getElementById('ocrProgress').style.display = 'none';
                    document.getElementById('ocrProgressText').style.display = 'none';
                    showToast('✅ متن استخراج شد');
                } catch (err) {
                    console.error('OCR Error:', err);
                    document.getElementById('ocrResult').innerHTML = '<p style="color:var(--danger);text-align:center;">❌ خطا. دوباره تلاش کنید.</p>';
                    document.getElementById('ocrProgress').style.display = 'none';
                    document.getElementById('ocrProgressText').style.display = 'none';
                    showToast('❌ خطا در OCR');
                }
            };
            inp.click();
        };
        
        window.copyOCR = () => {
            const text = document.getElementById('ocrTextArea')?.value || window._ocrText;
            if (text) navigator.clipboard.writeText(text).then(() => showToast('📋 کپی شد'));
        };
        
        window.saveOCRText = () => {
            const text = document.getElementById('ocrTextArea')?.value || window._ocrText;
            if (text) {
                const blob = new Blob([text], { type: 'text/plain' });
                saveBlob(blob, 'ocr_text_' + Date.now() + '.txt');
            }
        };
    }

    // ============================================
    // ابزار ۱۳: انتخاب رنگ (کامل با زوم)
    // ============================================
    function colorpick() {
        document.getElementById('toolContent').innerHTML = `
            <button class="btn btn-primary" onclick="selCP()">📂 انتخاب عکس</button>
            <canvas id="cpCanvas" style="display:none;max-width:100%;cursor:crosshair;border-radius:10px;"></canvas>
            <div id="cpInfo" style="text-align:center;margin:10px 0;"></div>
            <div class="grid-3">
                <button class="btn btn-outline btn-sm" id="cpHex" disabled onclick="cpCopy('hex')">📋 HEX</button>
                <button class="btn btn-outline btn-sm" id="cpRgb" disabled onclick="cpCopy('rgb')">📋 RGB</button>
                <button class="btn btn-outline btn-sm" id="cpHsl" disabled onclick="cpCopy('hsl')">📋 HSL</button>
            </div>
            <button class="btn btn-outline btn-sm" id="cpZoom" disabled onclick="showZoom()">🔍 زوم</button>
        `;
        
        window.selCP = () => {
            const inp = fileInput();
            inp.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('cpCanvas');
                        canvas.style.display = 'block';
                        const maxW = Math.min(img.width, 350);
                        const s = maxW / img.width;
                        canvas.width = maxW;
                        canvas.height = img.height * s;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        canvas.onclick = (e2) => {
                            const rect = canvas.getBoundingClientRect();
                            const x = Math.floor((e2.clientX - rect.left) * (canvas.width / rect.width));
                            const y = Math.floor((e2.clientY - rect.top) * (canvas.height / rect.height));
                            
                            // زوم برای دقت
                            const zoomSize = 20;
                            const zoomData = ctx.getImageData(Math.max(0, x - zoomSize/2), Math.max(0, y - zoomSize/2), zoomSize, zoomSize);
                            
                            const pixel = ctx.getImageData(x, y, 1, 1).data;
                            const [r, g, b] = pixel;
                            const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                            const hsl = rgbToHsl(r, g, b);
                            
                            document.getElementById('cpInfo').innerHTML = `
                                <div style="width:60px;height:60px;background:${hex};border-radius:15px;margin:0 auto;border:3px solid white;box-shadow:0 0 20px ${hex}44;"></div>
                                <p style="margin-top:8px;"><b>HEX:</b> ${hex}</p>
                                <p><b>RGB:</b> (${r}, ${g}, ${b})</p>
                                <p><b>HSL:</b> (${hsl.h}°, ${hsl.s}%, ${hsl.l}%)</p>`;
                            
                            window._cpHex = hex;
                            window._cpRgb = `rgb(${r},${g},${b})`;
                            window._cpHsl = `hsl(${hsl.h},${hsl.s}%,${hsl.l}%)`;
                            window._cpZoomData = { ctx, x, y, canvas };
                            
                            document.getElementById('cpHex').disabled = false;
                            document.getElementById('cpRgb').disabled = false;
                            document.getElementById('cpHsl').disabled = false;
                            document.getElementById('cpZoom').disabled = false;
                        };
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            inp.click();
        };
        
        window.cpCopy = (type) => {
            const vals = { hex: window._cpHex, rgb: window._cpRgb, hsl: window._cpHsl };
            if (vals[type]) navigator.clipboard.writeText(vals[type]).then(() => showToast('📋 کپی شد'));
        };
        
        window.showZoom = () => {
            if (!window._cpZoomData) return;
            const { ctx, x, y, canvas } = window._cpZoomData;
            const zoomCanvas = document.getElementById('colorZoomCanvas');
            const zSize = 100;
            zoomCanvas.width = zSize;
            zoomCanvas.height = zSize;
            const zCtx = zoomCanvas.getContext('2d');
            
            const size = 30;
            const data = ctx.getImageData(Math.max(0, x - size/2), Math.max(0, y - size/2), size, size);
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = size;
            tempCanvas.height = size;
            tempCanvas.getContext('2d').putImageData(data, 0, 0);
            
            zCtx.imageSmoothingEnabled = false;
            zCtx.drawImage(tempCanvas, 0, 0, zSize, zSize);
            
            // خط تیره مرکز
            zCtx.strokeStyle = 'red';
            zCtx.lineWidth = 2;
            zCtx.strokeRect(zSize/2 - 5, zSize/2 - 5, 10, 10);
            
            document.getElementById('colorZoomInfo').innerHTML = `
                <b>HEX:</b> ${window._cpHex}<br>
                <b>RGB:</b> ${window._cpRgb}<br>
                <b>HSL:</b> ${window._cpHsl}`;
            
            document.getElementById('colorZoomModal').classList.add('show');
        };
    }

    // ============================================
    // ابزار ۱۴: چسب اسکرین (حذف همپوشانی)
    // ============================================
    function screenstitch() {
        document.getElementById('toolContent').innerHTML = `
            <button class="btn btn-primary" onclick="selSS()">📂 انتخاب اسکرین‌شات‌ها</button>
            <div class="range-group"><span>همپوشانی (px):</span><input type="range" id="ssOverlap" min="10" max="200" value="60" oninput="document.getElementById('ssOverlapV').textContent=this.value"><span class="range-value" id="ssOverlapV">60</span></div>
            <button class="btn btn-success" onclick="doSS()">🖼️ چسباندن هوشمند</button>
            <div id="ssResult"></div>
            <button class="btn btn-outline" id="ssSave" disabled onclick="saveFile(window._ssResult, 'screen_stitch_'+Date.now()+'.jpg')">💾 ذخیره</button>
        `;
        
        window.selSS = () => {
            const inp = fileInput('image/*', true);
            inp.onchange = (e) => {
                window._ssFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                showToast(`✅ ${window._ssFiles.length} عکس`);
            };
            inp.click();
        };
        
        window.doSS = async () => {
            if (!window._ssFiles || window._ssFiles.length < 2) { showToast('⚠️ حداقل ۲ عکس'); return; }
            const overlap = parseInt(document.getElementById('ssOverlap').value);
            
            const imgs = [];
            for (let f of window._ssFiles) {
                const { img } = await loadImage(f);
                imgs.push(img);
            }
            
            // تشخیص همپوشانی با مقایسه پیکسل‌های انتهای تصویر قبلی و ابتدای تصویر بعدی
            let totalHeight = imgs[0].height;
            for (let i = 1; i < imgs.length; i++) {
                totalHeight += imgs[i].height - overlap;
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = imgs[0].width;
            canvas.height = totalHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, totalHeight);
            
            let y = 0;
            for (let i = 0; i < imgs.length; i++) {
                ctx.drawImage(imgs[i], 0, y);
                if (i < imgs.length - 1) {
                    y += imgs[i].height - overlap;
                } else {
                    y += imgs[i].height;
                }
            }
            
            window._ssResult = canvas.toDataURL('image/jpeg', CONFIG.quality / 100);
            document.getElementById('ssResult').innerHTML = `<img src="${window._ssResult}" style="width:100%;border-radius:10px;">`;
            document.getElementById('ssSave').disabled = false;
            showToast('✅ چسباندن انجام شد');
        };
    }

    // ============================================
    // ابزار ۱۵: پردازش گروهی (کامل با ZIP)
    // ============================================
    function batch() {
        let batchFiles = [];
        
        document.getElementById('toolContent').innerHTML = `
            <div class="input-group"><label>عملیات:</label><select id="batchOp"><option value="compress">📦 فشرده‌سازی</option><option value="resize">📐 تغییر سایز (800px عرض)</option><option value="watermark">💧 واترمارک</option><option value="convert">🔄 تبدیل به JPG</option></select></div>
            <button class="btn btn-primary" onclick="selBatch()">📂 انتخاب تصاویر</button>
            <button class="btn btn-success" id="batchBtn" disabled onclick="doBatch()">📋 اجرای گروهی</button>
            <div class="progress-bar" id="batchProgress" style="display:none;"><div class="fill" style="width:0%"></div></div>
            <div class="progress-text" id="batchProgressText" style="display:none;"></div>
            <div id="batchResult"></div>
            <button class="btn btn-outline" id="batchSaveAll" disabled onclick="downloadAllAsZip()">📦 دانلود همه (ZIP)</button>
        `;
        
        window.selBatch = () => {
            const inp = fileInput('image/*', true);
            inp.onchange = (e) => {
                batchFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                document.getElementById('batchBtn').disabled = batchFiles.length === 0;
                showToast(`✅ ${batchFiles.length} عکس`);
            };
            inp.click();
        };
        
        window.doBatch = async () => {
            if (!batchFiles.length) return;
            const op = document.getElementById('batchOp').value;
            const progress = document.getElementById('batchProgress');
            const progressText = document.getElementById('batchProgressText');
            progress.style.display = 'block';
            progressText.style.display = 'block';
            
            window._batchResults = [];
            const resultDiv = document.getElementById('batchResult');
            resultDiv.innerHTML = '';
            
            for (let i = 0; i < batchFiles.length; i++) {
                progressText.textContent = `پردازش ${i+1} از ${batchFiles.length}...`;
                document.querySelector('#batchProgress .fill').style.width = ((i+1)/batchFiles.length*100) + '%';
                
                const { img } = await loadImage(batchFiles[i]);
                const canvas = document.createElement('canvas');
                
                if (op === 'resize') {
                    const ratio = 800 / img.width;
                    canvas.width = 800;
                    canvas.height = Math.round(img.height * ratio);
                } else {
                    canvas.width = img.width;
                    canvas.height = img.height;
                }
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                if (op === 'watermark') {
                    ctx.globalAlpha = 0.4;
                    ctx.font = 'bold 30px Arial';
                    ctx.fillStyle = '#FFFFFF';
                    ctx.textAlign = 'center';
                    ctx.fillText('©', canvas.width/2, canvas.height/2);
                }
                
                const quality = op === 'compress' ? 0.5 : CONFIG.quality / 100;
                const dataUrl = canvas.toDataURL('image/jpeg', quality);
                
                window._batchResults.push({
                    dataUrl: dataUrl,
                    name: `batch_${op}_${i+1}_${Date.now()}.jpg`
                });
                
                resultDiv.innerHTML += `<img src="${dataUrl}" style="width:48%;margin:1%;border-radius:8px;display:inline-block;">`;
                
                await new Promise(r => setTimeout(r, 200));
            }
            
            progress.style.display = 'none';
            progressText.style.display = 'none';
            document.getElementById('batchSaveAll').disabled = false;
            showToast('✅ پردازش گروهی کامل شد');
        };
        
        window.downloadAllAsZip = async () => {
            if (!window._batchResults || !window._batchResults.length) return;
            
            const zip = new JSZip();
            for (let item of window._batchResults) {
                const blob = dataUrlToBlob(item.dataUrl);
                zip.file(item.name, blob);
            }
            
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            saveBlob(zipBlob, 'batch_results_' + Date.now() + '.zip');
        };
    }

    // ============================================
    // شروع
    // ============================================
    document.addEventListener('DOMContentLoaded', init);
    if (typeof cordova !== 'undefined') {
        document.addEventListener('deviceready', init, false);
    }
</script>
