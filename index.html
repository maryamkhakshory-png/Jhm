<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>🔧 جعبه ابزار حرفه‌ای</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6c5ce7;
            --dark: #1a1a2e;
            --card-bg: #2d3436;
            --text: #dfe6e9;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #dfe6e9;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            padding-bottom: 30px;
        }

        .header {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }

        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .subtitle { font-size: 13px; opacity: 0.9; }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tool-card {
            background: #2d3436;
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .tool-card:active { transform: scale(0.95); }
        .tool-card:hover { border-color: #6c5ce7; }

        .tool-icon { font-size: 40px; margin-bottom: 10px; }
        .tool-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        .tool-desc { font-size: 11px; color: #b2bec3; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #2d3436;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: sticky;
            top: 0;
            float: left;
            font-size: 24px;
            cursor: pointer;
            color: #b2bec3;
            z-index: 10;
            background: #2d3436;
            padding: 5px 10px;
            border-radius: 50%;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b894;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin: 8px 0;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; }
        .btn-success { background: #00b894; color: white; }
        .btn-danger { background: #d63031; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6c5ce7; color: #6c5ce7; }

        .preview-area {
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            max-height: 250px;
        }

        .thumb {
            height: 80px;
            border-radius: 8px;
            border: 2px solid #444;
        }

        .status-text {
            margin: 10px 0;
            font-size: 13px;
            color: #b2bec3;
            text-align: center;
            min-height: 20px;
        }

        .info-box {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            font-size: 12px;
            color: #aaa;
            border-right: 3px solid #6c5ce7;
        }

        .preview-full {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #444;
        }

        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .comparison-item {
            text-align: center;
        }

        .comparison-item img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #444;
        }

        .comparison-item p {
            font-size: 12px;
            margin-top: 5px;
            color: #b2bec3;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #444;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #6c5ce7;
            cursor: pointer;
        }

        @media (max-width: 350px) {
            .tools-grid { gap: 8px; }
            .tool-card { padding: 15px 10px; }
            .tool-icon { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🔧 جعبه ابزار حرفه‌ای</h1>
            <p class="subtitle">۴ ابزار قدرتمند و کاربردی</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card" onclick="openTool('stitch')">
                <div class="tool-icon">🧩</div>
                <div class="tool-name">چسبوندن عکس</div>
                <div class="tool-desc">عمودی با کیفیت عالی</div>
            </div>
            
            <div class="tool-card" onclick="openTool('pdf')">
                <div class="tool-icon">📄</div>
                <div class="tool-name">تبدیل به PDF</div>
                <div class="tool-desc">عکس‌ها به PDF</div>
            </div>
            
            <div class="tool-card" onclick="openTool('cleaner')">
                <div class="tool-icon">🧹</div>
                <div class="tool-name">کلینر حرفه‌ای</div>
                <div class="tool-desc">پاکسازی کامل</div>
            </div>
            
            <div class="tool-card" onclick="openTool('enhance')">
                <div class="tool-icon">✨</div>
                <div class="tool-name">بهبود کیفیت</div>
                <div class="tool-desc">روشن‌تر و شفاف‌تر</div>
            </div>
        </div>

        <div class="modal" id="toolModal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">✕</span>
                <div id="modalContent"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ============================================
        // توابع عمومی
        // ============================================
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(window._tt);
            window._tt = setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        function closeModal() {
            document.getElementById('toolModal').classList.remove('show');
        }
        
        function openTool(tool) {
            switch(tool) {
                case 'stitch': openStitchTool(); break;
                case 'pdf': openPDFTool(); break;
                case 'cleaner': openCleanerTool(); break;
                case 'enhance': openEnhanceTool(); break;
            }
        }

        // ============================================
        // تابع کمکی: خواندن فایل به صورت Image
        // ============================================
        
        function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve({ img, dataUrl: e.target.result });
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ============================================
        // ابزار ۱: چسبوندن عکس عمودی
        // ============================================
        
        let stitchFiles = [];
        let stitchedDataUrl = null;
        
        function openStitchTool() {
            stitchFiles = [];
            stitchedDataUrl = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">🧩 چسبوندن عکس عمودی</h2>
                
                <div class="info-box">
                    💡 خروجی با <b>فرمت JPEG و کیفیت ۱۰۰٪</b> ذخیره می‌شود.
                </div>
                
                <div class="preview-area" id="stitchPreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="stitchStatus">آماده برای انتخاب تصاویر</div>
                
                <input type="file" id="stitchInput" accept="image/*" multiple style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('stitchInput').click()">
                    📂 انتخاب عکس‌ها
                </button>
                
                <button class="btn btn-success" id="stitchBtn" disabled onclick="stitchImages()">
                    ✂️ چسبوندن و ساختن فایل
                </button>
                
                <div id="stitchResult"></div>
                
                <button class="btn btn-outline" id="stitchDownload" disabled onclick="downloadResult('stitch')">
                    💾 ذخیره در گالری
                </button>
                
                <button class="btn btn-outline" id="stitchShare" disabled onclick="shareResult('stitch')">
                    📤 اشتراک‌گذاری
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            document.getElementById('stitchInput').addEventListener('change', handleStitchFiles);
        }
        
        function handleStitchFiles(e) {
            stitchFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (stitchFiles.length === 0) {
                showToast('⚠️ لطفاً عکس انتخاب کنید');
                return;
            }
            
            const preview = document.getElementById('stitchPreview');
            preview.innerHTML = '';
            
            stitchFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'thumb';
                    img.title = `عکس ${index + 1}`;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            
            document.getElementById('stitchBtn').disabled = false;
            document.getElementById('stitchStatus').textContent = `${stitchFiles.length} عکس انتخاب شد`;
        }
        
        async function stitchImages() {
            if (stitchFiles.length === 0) return;
            
            const btn = document.getElementById('stitchBtn');
            btn.disabled = true;
            document.getElementById('stitchStatus').textContent = '⏳ در حال چسبوندن عکس‌ها...';
            
            try {
                // بارگذاری همه عکس‌ها
                const images = [];
                for (let file of stitchFiles) {
                    const { img } = await loadImageFromFile(file);
                    images.push(img);
                }
                
                // محاسبه ابعاد نهایی
                let maxWidth = 0;
                let totalHeight = 0;
                
                images.forEach(img => {
                    if (img.width > maxWidth) maxWidth = img.width;
                    totalHeight += img.height;
                });
                
                // ساخت Canvas نهایی
                const canvas = document.createElement('canvas');
                canvas.width = maxWidth;
                canvas.height = totalHeight;
                const ctx = canvas.getContext('2d');
                
                // رنگ پس‌زمینه سفید
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, maxWidth, totalHeight);
                
                // چسبوندن عکس‌ها
                let yOffset = 0;
                images.forEach(img => {
                    const xOffset = Math.floor((maxWidth - img.width) / 2);
                    ctx.drawImage(img, xOffset, yOffset);
                    yOffset += img.height;
                });
                
                // ذخیره نتیجه
                stitchedDataUrl = canvas.toDataURL('image/jpeg', 1.0);
                
                // نمایش پیش‌نمایش
                document.getElementById('stitchResult').innerHTML = `
                    <div style="margin-top:15px;">
                        <p style="color:#00b894;text-align:center;">✅ چسبوندن با موفقیت انجام شد!</p>
                        <img src="${stitchedDataUrl}" class="preview-full" alt="نتیجه">
                    </div>
                `;
                
                document.getElementById('stitchStatus').textContent = '✅ آماده! می‌توانید ذخیره یا اشتراک‌گذاری کنید';
                document.getElementById('stitchDownload').disabled = false;
                document.getElementById('stitchShare').disabled = false;
                btn.disabled = false;
                
            } catch (error) {
                console.error(error);
                document.getElementById('stitchStatus').textContent = '❌ خطا: ' + error.message;
                btn.disabled = false;
                showToast('❌ خطا در چسبوندن عکس');
            }
        }

        // ============================================
        // ابزار ۲: تبدیل به PDF
        // ============================================
        
        let pdfFiles = [];
        let pdfBlob = null;
        
        function openPDFTool() {
            pdfFiles = [];
            pdfBlob = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">📄 تبدیل عکس به PDF</h2>
                
                <div class="preview-area" id="pdfPreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="pdfStatus">انتخاب عکس‌ها برای تبدیل به PDF</div>
                
                <input type="file" id="pdfInput" accept="image/*" multiple style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('pdfInput').click()">
                    📂 انتخاب عکس‌ها
                </button>
                
                <button class="btn btn-success" id="pdfBtn" disabled onclick="convertToPDF()">
                    📄 تبدیل به PDF
                </button>
                
                <div id="pdfResult"></div>
                
                <button class="btn btn-outline" id="pdfDownload" disabled onclick="downloadResult('pdf')">
                    💾 ذخیره PDF
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            document.getElementById('pdfInput').addEventListener('change', handlePDFFiles);
        }
        
        function handlePDFFiles(e) {
            pdfFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (pdfFiles.length === 0) return;
            
            const preview = document.getElementById('pdfPreview');
            preview.innerHTML = '';
            
            pdfFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'thumb';
                    img.title = `صفحه ${index + 1}`;
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            
            document.getElementById('pdfBtn').disabled = false;
            document.getElementById('pdfStatus').textContent = `${pdfFiles.length} عکس انتخاب شد`;
        }
        
        async function convertToPDF() {
            if (pdfFiles.length === 0) return;
            
            const btn = document.getElementById('pdfBtn');
            btn.disabled = true;
            document.getElementById('pdfStatus').textContent = '⏳ در حال ساخت PDF...';
            
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                for (let i = 0; i < pdfFiles.length; i++) {
                    if (i > 0) pdf.addPage();
                    
                    const { img, dataUrl } = await loadImageFromFile(pdfFiles[i]);
                    
                    const pageWidth = 210; // A4 width in mm
                    const pageHeight = 297; // A4 height in mm
                    const margin = 10;
                    
                    let imgWidth = pageWidth - (margin * 2);
                    let imgHeight = (img.height / img.width) * imgWidth;
                    
                    if (imgHeight > pageHeight - (margin * 2)) {
                        imgHeight = pageHeight - (margin * 2);
                        imgWidth = (img.width / img.height) * imgHeight;
                    }
                    
                    const x = (pageWidth - imgWidth) / 2;
                    const y = (pageHeight - imgHeight) / 2;
                    
                    pdf.addImage(dataUrl, 'JPEG', x, y, imgWidth, imgHeight);
                }
                
                pdfBlob = pdf.output('blob');
                
                document.getElementById('pdfResult').innerHTML = `
                    <p style="color:#00b894;text-align:center;margin-top:15px;">✅ PDF با ${pdfFiles.length} صفحه آماده شد!</p>
                `;
                
                document.getElementById('pdfStatus').textContent = '✅ PDF آماده! می‌توانید ذخیره کنید';
                document.getElementById('pdfDownload').disabled = false;
                btn.disabled = false;
                
            } catch (error) {
                console.error(error);
                document.getElementById('pdfStatus').textContent = '❌ خطا: ' + error.message;
                btn.disabled = false;
                showToast('❌ خطا در ساخت PDF');
            }
        }

        // ============================================
        // ابزار ۳: کلینر حرفه‌ای
        // ============================================
        
        function openCleanerTool() {
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">🧹 کلینر حرفه‌ای</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div style="background:#1a1a1a;border-radius:15px;padding:20px;text-align:center;cursor:pointer;border:2px solid transparent;" 
                         id="ibisCard" onclick="cleanApp('ibis')">
                        <div style="font-size:50px;margin-bottom:10px;">🎨</div>
                        <div style="font-weight:bold;font-size:16px;margin-bottom:5px;">iBisPaint X</div>
                        <div style="font-size:11px;color:#aaa;">پاکسازی کش و فایل‌های موقت</div>
                    </div>
                    
                    <div style="background:#1a1a1a;border-radius:15px;padding:20px;text-align:center;cursor:pointer;border:2px solid transparent;" 
                         id="retouchCard" onclick="cleanApp('retouch')">
                        <div style="font-size:50px;margin-bottom:10px;">🖼️</div>
                        <div style="font-weight:bold;font-size:16px;margin-bottom:5px;">Retouch</div>
                        <div style="font-size:11px;color:#aaa;">پاکسازی پروژه‌های قدیمی</div>
                    </div>
                </div>
                
                <div class="info-box" id="cleanerInfo">
                    🧹 برای شروع پاکسازی، روی یکی از برنامه‌ها کلیک کنید
                </div>
                
                <div id="cleanerActions"></div>
                
                <div id="cleanerProgress" style="margin-top:10px;"></div>
            `;
            
            document.getElementById('toolModal').classList.add('show');
        }
        
        function cleanApp(app) {
            // هایلایت کارت انتخاب شده
            document.getElementById('ibisCard').style.borderColor = '#2d3436';
            document.getElementById('retouchCard').style.borderColor = '#2d3436';
            
            const info = document.getElementById('cleanerInfo');
            const actions = document.getElementById('cleanerActions');
            const progress = document.getElementById('cleanerProgress');
            progress.innerHTML = '';
            
            if (app === 'ibis') {
                document.getElementById('ibisCard').style.borderColor = '#6c5ce7';
                info.innerHTML = '🎨 <b>iBisPaint X - آماده پاکسازی</b>';
                
                actions.innerHTML = `
                    <button class="btn btn-success" onclick="performClean('ibis')">
                        🧹 شروع پاکسازی iBisPaint X
                    </button>
                    <div class="info-box">
                        📋 <b>موارد پاکسازی:</b><br>
                        • کش و فایل‌های موقت<br>
                        • Thumbnail های غیرضروری<br>
                        • داده‌های ذخیره شده موقت<br>
                        • فایل‌های preview قدیمی
                    </div>
                `;
            } else {
                document.getElementById('retouchCard').style.borderColor = '#6c5ce7';
                info.innerHTML = '🖼️ <b>Retouch - آماده پاکسازی</b>';
                
                actions.innerHTML = `
                    <button class="btn btn-success" onclick="performClean('retouch')">
                        🧹 شروع پاکسازی Retouch
                    </button>
                    <div class="info-box">
                        📋 <b>موارد پاکسازی:</b><br>
                        • پروژه‌های ذخیره شده قدیمی<br>
                        • فایل‌های export قبلی<br>
                        • داده‌های کش شده<br>
                        • تاریخچه ویرایش‌ها
                    </div>
                `;
            }
        }
        
        function performClean(app) {
            const progress = document.getElementById('cleanerProgress');
            progress.innerHTML = '<p style="color:#fdcb6e;">⏳ در حال پاکسازی...</p>';
            
            let cleanedItems = 0;
            
            // پاکسازی localStorage مرتبط
            const keywords = app === 'ibis' ? ['ibis', 'paint', 'drawing'] : ['retouch', 'touch', 'photo', 'edit'];
            
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                for (let keyword of keywords) {
                    if (key.toLowerCase().includes(keyword)) {
                        localStorage.removeItem(key);
                        cleanedItems++;
                        break;
                    }
                }
            }
            
            // پاکسازی cache
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => {
                        for (let keyword of keywords) {
                            if (name.toLowerCase().includes(keyword)) {
                                caches.delete(name);
                                cleanedItems++;
                                break;
                            }
                        }
                    });
                });
            }
            
            // پاکسازی sessionStorage
            for (let i = sessionStorage.length - 1; i >= 0; i--) {
                const key = sessionStorage.key(i);
                for (let keyword of keywords) {
                    if (key.toLowerCase().includes(keyword)) {
                        sessionStorage.removeItem(key);
                        cleanedItems++;
                        break;
                    }
                }
            }
            
            setTimeout(() => {
                progress.innerHTML = `
                    <div style="background:#00b894;color:white;padding:15px;border-radius:10px;text-align:center;">
                        ✅ <b>پاکسازی با موفقیت انجام شد!</b><br>
                        🗑️ ${cleanedItems} آیتم پاکسازی شد<br>
                        💾 فضای بیشتری آزاد شد
                    </div>
                `;
                showToast(`✅ ${app === 'ibis' ? 'iBisPaint X' : 'Retouch'} پاکسازی شد`);
            }, 1000);
        }

        // ============================================
        // ابزار ۴: بهبود کیفیت عکس
        // ============================================
        
        let enhanceFile = null;
        let enhancedDataUrl = null;
        
        function openEnhanceTool() {
            enhanceFile = null;
            enhancedDataUrl = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">✨ بهبود کیفیت عکس</h2>
                
                <div class="info-box">
                    💡 عکس شما روشن‌تر، شفاف‌تر و با کیفیت‌تر می‌شود
                </div>
                
                <div class="preview-area" id="enhancePreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="enhanceStatus">یک عکس انتخاب کنید</div>
                
                <div class="slider-container">
                    <span style="font-size:12px;">کم</span>
                    <input type="range" id="enhanceLevel" min="1" max="10" value="5" oninput="document.getElementById('enhanceValue').textContent=this.value">
                    <span style="font-size:12px;">زیاد</span>
                </div>
                <div style="text-align:center;font-size:12px;color:#aaa;">میزان بهبود: <span id="enhanceValue">5</span>/10</div>
                
                <input type="file" id="enhanceInput" accept="image/*" style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('enhanceInput').click()">
                    📂 انتخاب عکس
                </button>
                
                <button class="btn btn-success" id="enhanceBtn" disabled onclick="enhanceImage()">
                    ✨ بهبود کیفیت
                </button>
                
                <div id="enhanceResult"></div>
                
                <button class="btn btn-outline" id="enhanceDownload" disabled onclick="downloadResult('enhance')">
                    💾 ذخیره عکس بهبود یافته
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            document.getElementById('enhanceInput').addEventListener('change', handleEnhanceFile);
        }
        
        function handleEnhanceFile(e) {
            if (e.target.files.length === 0) return;
            enhanceFile = e.target.files[0];
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('enhancePreview').innerHTML = `
                    <img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:10px;">
                `;
            };
            reader.readAsDataURL(enhanceFile);
            
            document.getElementById('enhanceBtn').disabled = false;
            document.getElementById('enhanceStatus').textContent = 'عکس آماده بهبود است';
        }
        
        async function enhanceImage() {
            if (!enhanceFile) return;
            
            const btn = document.getElementById('enhanceBtn');
            btn.disabled = true;
            document.getElementById('enhanceStatus').textContent = '⏳ در حال بهبود کیفیت...';
            
            try {
                const { img } = await loadImageFromFile(enhanceFile);
                const level = parseInt(document.getElementById('enhanceLevel').value);
                
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                const brightness = 1 + (level * 0.04);
                const contrast = 1 + (level * 0.06);
                const saturation = 1 + (level * 0.05);
                
                for (let i = 0; i < data.length; i += 4) {
                    // Brightness
                    data[i] = Math.min(255, data[i] * brightness);
                    data[i+1] = Math.min(255, data[i+1] * brightness);
                    data[i+2] = Math.min(255, data[i+2] * brightness);
                    
                    // Contrast
                    for (let j = 0; j < 3; j++) {
                        data[i+j] = ((data[i+j] / 255 - 0.5) * contrast + 0.5) * 255;
                        data[i+j] = Math.max(0, Math.min(255, data[i+j]));
                    }
                    
                    // Saturation
                    const gray = 0.2989 * data[i] + 0.5870 * data[i+1] + 0.1140 * data[i+2];
                    data[i] = Math.min(255, gray + saturation * (data[i] - gray));
                    data[i+1] = Math.min(255, gray + saturation * (data[i+1] - gray));
                    data[i+2] = Math.min(255, gray + saturation * (data[i+2] - gray));
                }
                
                ctx.putImageData(imageData, 0, 0);
                enhancedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                
                // نمایش قبل و بعد
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('enhanceResult').innerHTML = `
                        <div class="comparison-container">
                            <div class="comparison-item">
                                <img src="${e.target.result}" alt="قبل">
                                <p>📷 قبل</p>
                            </div>
                            <div class="comparison-item">
                                <img src="${enhancedDataUrl}" alt="بعد">
                                <p>✨ بعد</p>
                            </div>
                        </div>
                    `;
                };
                reader.readAsDataURL(enhanceFile);
                
                document.getElementById('enhanceStatus').textContent = '✅ کیفیت بهبود یافت!';
                document.getElementById('enhanceDownload').disabled = false;
                btn.disabled = false;
                
            } catch (error) {
                console.error(error);
                document.getElementById('enhanceStatus').textContent = '❌ خطا: ' + error.message;
                btn.disabled = false;
                showToast('❌ خطا در بهبود کیفیت');
            }
        }

        // ============================================
        // توابع دانلود و اشتراک‌گذاری
        // ============================================
        
        function downloadResult(type) {
            if (type === 'stitch' && stitchedDataUrl) {
                downloadDataUrl(stitchedDataUrl, `stitched_${Date.now()}.jpg`);
            } else if (type === 'pdf' && pdfBlob) {
                downloadBlob(pdfBlob, `document_${Date.now()}.pdf`);
            } else if (type === 'enhance' && enhancedDataUrl) {
                downloadDataUrl(enhancedDataUrl, `enhanced_${Date.now()}.jpg`);
            }
        }
        
        function downloadDataUrl(dataUrl, filename) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('💾 فایل ذخیره شد');
        }
        
        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('💾 فایل ذخیره شد');
        }
        
        async function shareResult(type) {
            let blob;
            
            if (type === 'stitch' && stitchedDataUrl) {
                const res = await fetch(stitchedDataUrl);
                blob = await res.blob();
            } else if (type === 'pdf' && pdfBlob) {
                blob = pdfBlob;
            } else {
                showToast('⚠️ ابتدا فایل را بسازید');
                return;
            }
            
            if (!blob) return;
            
            const file = new File([blob], type === 'pdf' ? 'document.pdf' : 'image.jpg', { 
                type: type === 'pdf' ? 'application/pdf' : 'image/jpeg' 
            });
            
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'فایل آماده شد',
                    });
                    showToast('📤 اشتراک‌گذاری انجام شد');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        downloadResult(type);
                    }
                }
            } else {
                showToast('📤 اشتراک‌گذاری پشتیبانی نمی‌شود - فایل ذخیره شد');
                downloadResult(type);
            }
        }

        // بستن مودال با کلیک خارج
        document.getElementById('toolModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
