<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>🔧 جعبه ابزار حرفه‌ای</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6c5ce7;
            --dark: #1a1a2e;
            --card-bg: #2d3436;
            --text: #dfe6e9;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #dfe6e9;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            padding-bottom: 30px;
        }

        .header {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }

        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .subtitle { font-size: 13px; opacity: 0.9; }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tool-card {
            background: #2d3436;
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .tool-card:active { transform: scale(0.95); }
        .tool-icon { font-size: 40px; margin-bottom: 10px; }
        .tool-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        .tool-desc { font-size: 11px; color: #b2bec3; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #2d3436;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: sticky;
            top: 0;
            float: left;
            font-size: 24px;
            cursor: pointer;
            color: #b2bec3;
            z-index: 10;
            background: #2d3436;
            padding: 5px 10px;
            border-radius: 50%;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b894;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin: 8px 0;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; }
        .btn-success { background: #00b894; color: white; }
        .btn-danger { background: #d63031; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6c5ce7; color: #6c5ce7; }

        .preview-area {
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            max-height: 250px;
        }

        .thumb {
            height: 80px;
            border-radius: 8px;
            border: 2px solid #444;
        }

        .status-text {
            margin: 10px 0;
            font-size: 13px;
            color: #b2bec3;
            text-align: center;
            min-height: 20px;
        }

        .info-box {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            font-size: 12px;
            color: #aaa;
            border-right: 3px solid #6c5ce7;
        }

        .preview-full {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #444;
        }

        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .comparison-item { text-align: center; }
        .comparison-item img { width: 100%; border-radius: 10px; border: 2px solid #444; }
        .comparison-item p { font-size: 12px; margin-top: 5px; color: #b2bec3; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #444;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #6c5ce7;
            cursor: pointer;
        }

        #cleanCanvas {
            display: block;
            margin: 10px auto;
            border: 2px solid #444;
            border-radius: 10px;
            cursor: crosshair;
            max-width: 100%;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-dot.active {
            border-color: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @media (max-width: 350px) {
            .tools-grid { gap: 8px; }
            .tool-card { padding: 15px 10px; }
            .tool-icon { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🔧 جعبه ابزار حرفه‌ای</h1>
            <p class="subtitle">۴ ابزار قدرتمند و کاربردی</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card" onclick="openTool('stitch')">
                <div class="tool-icon">🧩</div>
                <div class="tool-name">چسبوندن عکس</div>
                <div class="tool-desc">عمودی با کیفیت عالی</div>
            </div>
            
            <div class="tool-card" onclick="openTool('pdf')">
                <div class="tool-icon">📄</div>
                <div class="tool-name">تبدیل به PDF</div>
                <div class="tool-desc">عکس‌ها به PDF</div>
            </div>
            
            <div class="tool-card" onclick="openTool('cleaner')">
                <div class="tool-icon">🧹</div>
                <div class="tool-name">کلینر عکس</div>
                <div class="tool-desc">پاک کردن متن از عکس</div>
            </div>
            
            <div class="tool-card" onclick="openTool('enhance')">
                <div class="tool-icon">✨</div>
                <div class="tool-name">بهبود کیفیت</div>
                <div class="tool-desc">روشن‌تر و شفاف‌تر</div>
            </div>
        </div>

        <div class="modal" id="toolModal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">✕</span>
                <div id="modalContent"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <!-- Cordova Plugin -->
    <script src="cordova.js"></script>
    
    <script>
        // ============================================
        // منتظر آماده شدن Cordova
        // ============================================
        
        document.addEventListener('deviceready', function() {
            console.log('Cordova ready!');
        }, false);
        
        // ============================================
        // توابع عمومی
        // ============================================
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(window._tt);
            window._tt = setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        function closeModal() {
            document.getElementById('toolModal').classList.remove('show');
        }
        
        function openTool(tool) {
            switch(tool) {
                case 'stitch': openStitchTool(); break;
                case 'pdf': openPDFTool(); break;
                case 'cleaner': openCleanerTool(); break;
                case 'enhance': openEnhanceTool(); break;
            }
        }

        // ============================================
        // تابع ذخیره در گالری (Median.co / Cordova)
        // ============================================
        
        function saveToGallery(dataUrl, filename) {
            // روش ۱: استفاده از WebIntent برای ذخیره
            if (window.plugins && window.plugins.webintent) {
                // ذخیره با WebIntent
                saveWithWebIntent(dataUrl, filename);
                return;
            }
            
            // روش ۲: ذخیره با FileTransfer
            if (window.FileTransfer && window.requestFileSystem) {
                saveWithFileSystem(dataUrl, filename);
                return;
            }
            
            // روش ۳: دانلود مستقیم
            downloadDirectly(dataUrl, filename);
        }
        
        function saveWithWebIntent(dataUrl, filename) {
            // تبدیل dataUrl به فایل و ذخیره با intent
            window.plugins.webintent.saveToGallery(
                dataUrl,
                filename,
                function() { showToast('💾 ذخیره در گالری انجام شد'); },
                function() { downloadDirectly(dataUrl, filename); }
            );
        }
        
        function saveWithFileSystem(dataUrl, filename) {
            window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, function(fileSystem) {
                fileSystem.root.getFile(filename, { create: true, exclusive: false }, function(fileEntry) {
                    fileEntry.createWriter(function(fileWriter) {
                        fileWriter.onwriteend = function() {
                            // اسکن مدیا برای نمایش در گالری
                            if (window.MediaScanner) {
                                window.MediaScanner.scanFile(fileEntry.toURL(), 'image/jpeg', function() {
                                    showToast('💾 ذخیره در گالری انجام شد');
                                });
                            } else {
                                showToast('💾 فایل ذخیره شد');
                            }
                        };
                        
                        // تبدیل base64 به blob
                        const byteString = atob(dataUrl.split(',')[1]);
                        const arrayBuffer = new ArrayBuffer(byteString.length);
                        const intArray = new Uint8Array(arrayBuffer);
                        for (let i = 0; i < byteString.length; i++) {
                            intArray[i] = byteString.charCodeAt(i);
                        }
                        fileWriter.write(new Blob([intArray], { type: 'image/jpeg' }));
                    });
                });
            });
        }
        
        function saveBlobToGallery(blob, filename) {
            if (window.plugins && window.plugins.webintent) {
                const reader = new FileReader();
                reader.onload = function() {
                    saveWithWebIntent(reader.result, filename);
                };
                reader.readAsDataURL(blob);
                return;
            }
            
            if (window.requestFileSystem) {
                window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, function(fileSystem) {
                    fileSystem.root.getFile(filename, { create: true }, function(fileEntry) {
                        fileEntry.createWriter(function(fileWriter) {
                            fileWriter.onwriteend = function() {
                                showToast('💾 فایل ذخیره شد');
                            };
                            fileWriter.write(blob);
                        });
                    });
                });
                return;
            }
            
            // Fallback
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('💾 فایل ذخیره شد (پوشه Downloads)');
        }
        
        function downloadDirectly(dataUrl, filename) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // تلاش برای باز کردن با برنامه گالری
            if (window.plugins && window.plugins.fileopener) {
                setTimeout(() => {
                    window.plugins.fileopener.open(dataUrl, 'image/jpeg');
                }, 500);
            }
            
            showToast('💾 فایل ذخیره شد');
        }

        // ============================================
        // تابع کمکی: خواندن فایل به صورت Image
        // ============================================
        
        function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve({ img, dataUrl: e.target.result });
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ============================================
        // ابزار ۱: چسبوندن عکس عمودی
        // ============================================
        
        let stitchFiles = [];
        let stitchedDataUrl = null;
        
        function openStitchTool() {
            stitchFiles = [];
            stitchedDataUrl = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">🧩 چسبوندن عکس عمودی</h2>
                
                <div class="preview-area" id="stitchPreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="stitchStatus">آماده برای انتخاب تصاویر</div>
                
                <input type="file" id="stitchInput" accept="image/*" multiple style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('stitchInput').click()">
                    📂 انتخاب عکس‌ها
                </button>
                
                <button class="btn btn-success" id="stitchBtn" disabled onclick="stitchImages()">
                    ✂️ چسبوندن و ساختن فایل
                </button>
                
                <div id="stitchResult"></div>
                
                <button class="btn btn-outline" id="stitchDownload" disabled onclick="saveToGallery(stitchedDataUrl, 'stitched_' + Date.now() + '.jpg')">
                    💾 ذخیره در گالری
                </button>
                
                <button class="btn btn-outline" id="stitchShare" disabled onclick="shareImage(stitchedDataUrl)">
                    📤 اشتراک‌گذاری
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            document.getElementById('stitchInput').addEventListener('change', handleStitchFiles);
        }
        
        function handleStitchFiles(e) {
            stitchFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (stitchFiles.length === 0) return;
            
            const preview = document.getElementById('stitchPreview');
            preview.innerHTML = '';
            
            stitchFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'thumb';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            
            document.getElementById('stitchBtn').disabled = false;
            document.getElementById('stitchStatus').textContent = `${stitchFiles.length} عکس انتخاب شد`;
        }
        
        async function stitchImages() {
            if (stitchFiles.length === 0) return;
            
            const btn = document.getElementById('stitchBtn');
            btn.disabled = true;
            document.getElementById('stitchStatus').textContent = '⏳ در حال چسبوندن عکس‌ها...';
            
            try {
                const images = [];
                for (let file of stitchFiles) {
                    const { img } = await loadImageFromFile(file);
                    images.push(img);
                }
                
                let maxWidth = 0;
                let totalHeight = 0;
                
                images.forEach(img => {
                    if (img.width > maxWidth) maxWidth = img.width;
                    totalHeight += img.height;
                });
                
                const canvas = document.createElement('canvas');
                canvas.width = maxWidth;
                canvas.height = totalHeight;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, maxWidth, totalHeight);
                
                let yOffset = 0;
                images.forEach(img => {
                    const xOffset = Math.floor((maxWidth - img.width) / 2);
                    ctx.drawImage(img, xOffset, yOffset);
                    yOffset += img.height;
                });
                
                stitchedDataUrl = canvas.toDataURL('image/jpeg', 1.0);
                
                document.getElementById('stitchResult').innerHTML = `
                    <div style="margin-top:15px;">
                        <p style="color:#00b894;text-align:center;">✅ چسبوندن با موفقیت انجام شد!</p>
                        <img src="${stitchedDataUrl}" class="preview-full" alt="نتیجه">
                    </div>
                `;
                
                document.getElementById('stitchStatus').textContent = '✅ آماده!';
                document.getElementById('stitchDownload').disabled = false;
                document.getElementById('stitchShare').disabled = false;
                btn.disabled = false;
                
            } catch (error) {
                document.getElementById('stitchStatus').textContent = '❌ خطا';
                btn.disabled = false;
            }
        }

        // ============================================
        // ابزار ۲: تبدیل به PDF
        // ============================================
        
        let pdfBlob = null;
        
        function openPDFTool() {
            pdfBlob = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">📄 تبدیل عکس به PDF</h2>
                
                <div class="preview-area" id="pdfPreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="pdfStatus">انتخاب عکس‌ها</div>
                
                <input type="file" id="pdfInput" accept="image/*" multiple style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('pdfInput').click()">
                    📂 انتخاب عکس‌ها
                </button>
                
                <button class="btn btn-success" id="pdfBtn" disabled onclick="convertToPDF()">
                    📄 تبدیل به PDF
                </button>
                
                <div id="pdfResult"></div>
                
                <button class="btn btn-outline" id="pdfDownload" disabled onclick="saveBlobToGallery(pdfBlob, 'document_' + Date.now() + '.pdf')">
                    💾 ذخیره PDF
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            
            let pdfFiles = [];
            document.getElementById('pdfInput').addEventListener('change', function(e) {
                pdfFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                if (pdfFiles.length === 0) return;
                
                const preview = document.getElementById('pdfPreview');
                preview.innerHTML = '';
                pdfFiles.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'thumb';
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
                
                document.getElementById('pdfBtn').disabled = false;
                document.getElementById('pdfStatus').textContent = `${pdfFiles.length} عکس انتخاب شد`;
                window._pdfFiles = pdfFiles;
            });
        }
        
        async function convertToPDF() {
            const pdfFiles = window._pdfFiles;
            if (!pdfFiles || pdfFiles.length === 0) return;
            
            const btn = document.getElementById('pdfBtn');
            btn.disabled = true;
            document.getElementById('pdfStatus').textContent = '⏳ در حال ساخت PDF...';
            
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                for (let i = 0; i < pdfFiles.length; i++) {
                    if (i > 0) pdf.addPage();
                    const { img, dataUrl } = await loadImageFromFile(pdfFiles[i]);
                    
                    const pw = 210, ph = 297, m = 10;
                    let iw = pw - m*2, ih = (img.height/img.width) * iw;
                    if (ih > ph - m*2) { ih = ph - m*2; iw = (img.width/img.height) * ih; }
                    
                    pdf.addImage(dataUrl, 'JPEG', (pw-iw)/2, (ph-ih)/2, iw, ih);
                }
                
                pdfBlob = pdf.output('blob');
                document.getElementById('pdfResult').innerHTML = '<p style="color:#00b894;text-align:center;margin-top:15px;">✅ PDF آماده شد!</p>';
                document.getElementById('pdfStatus').textContent = '✅ آماده!';
                document.getElementById('pdfDownload').disabled = false;
                btn.disabled = false;
            } catch (error) {
                document.getElementById('pdfStatus').textContent = '❌ خطا';
                btn.disabled = false;
            }
        }

        // ============================================
        // ابزار ۳: کلینر عکس (پاک کردن متن)
        // ============================================
        
        let cleanImage = null;
        let cleanCanvas = null;
        let cleanCtx = null;
        let isDrawing = false;
        let brushSize = 20;
        
        function openCleanerTool() {
            cleanImage = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">🧹 کلینر عکس</h2>
                
                <div class="info-box">
                    💡 عکس رو انتخاب کن، با انگشت روی متن‌ها بکش تا پاک بشن.
                </div>
                
                <input type="file" id="cleanerInput" accept="image/*" style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('cleanerInput').click()">
                    📂 انتخاب عکس
                </button>
                
                <div style="text-align:center; margin:10px 0;">
                    <label style="font-size:12px;">سایز قلم: <span id="brushSizeLabel">20</span>px</label>
                    <input type="range" id="brushSize" min="5" max="60" value="20" 
                           oninput="brushSize=parseInt(this.value);document.getElementById('brushSizeLabel').textContent=this.value">
                </div>
                
                <div class="color-picker" id="colorPicker">
                    <div class="color-dot active" style="background:#FFFFFF;" data-color="#FFFFFF" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#000000;" data-color="#000000" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#808080;" data-color="#808080" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#F5DEB3;" data-color="#F5DEB3" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#E8E8E8;" data-color="#E8E8E8" onclick="selectCleanColor(this)"></div>
                </div>
                
                <div style="text-align:center; margin:10px 0;">
                    <canvas id="cleanCanvas" style="display:none;"></canvas>
                </div>
                
                <div class="status-text" id="cleanerStatus">یک عکس انتخاب کنید</div>
                
                <button class="btn btn-outline" id="cleanerUndo" disabled onclick="undoClean()">
                    ↩️ بازگشت
                </button>
                
                <button class="btn btn-success" id="cleanerSave" disabled onclick="saveCleanedImage()">
                    💾 ذخیره در گالری
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            
            document.getElementById('cleanerInput').addEventListener('change', function(e) {
                if (e.target.files.length === 0) return;
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = function() {
                        cleanImage = img;
                        setupCleanCanvas(img);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
        
        function selectCleanColor(dot) {
            document.querySelectorAll('#colorPicker .color-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        }
        
        function setupCleanCanvas(img) {
            cleanCanvas = document.getElementById('cleanCanvas');
            cleanCanvas.style.display = 'block';
            
            const maxW = Math.min(img.width, 350);
            const scale = maxW / img.width;
            cleanCanvas.width = maxW;
            cleanCanvas.height = img.height * scale;
            
            cleanCtx = cleanCanvas.getContext('2d');
            cleanCtx.drawImage(img, 0, 0, cleanCanvas.width, cleanCanvas.height);
            
            window._cleanHistory = [cleanCtx.getImageData(0, 0, cleanCanvas.width, cleanCanvas.height)];
            
            document.getElementById('cleanerStatus').textContent = 'روی متن‌ها بکشید';
            document.getElementById('cleanerSave').disabled = false;
            document.getElementById('cleanerUndo').disabled = false;
            
            cleanCanvas.addEventListener('touchstart', startCleanDraw, { passive: false });
            cleanCanvas.addEventListener('touchend', stopCleanDraw);
            cleanCanvas.addEventListener('touchmove', cleanDraw, { passive: false });
            cleanCanvas.addEventListener('mousedown', startCleanDraw);
            cleanCanvas.addEventListener('mouseup', stopCleanDraw);
            cleanCanvas.addEventListener('mousemove', cleanDraw);
            cleanCanvas.addEventListener('mouseleave', stopCleanDraw);
        }
        
        function getCleanPos(e) {
            const rect = cleanCanvas.getBoundingClientRect();
            const scaleX = cleanCanvas.width / rect.width;
            const scaleY = cleanCanvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        function startCleanDraw(e) {
            e.preventDefault();
            isDrawing = true;
            cleanDraw(e);
        }
        
        function stopCleanDraw() {
            if (isDrawing) {
                isDrawing = false;
                window._cleanHistory.push(cleanCtx.getImageData(0, 0, cleanCanvas.width, cleanCanvas.height));
                if (window._cleanHistory.length > 20) window._cleanHistory.shift();
            }
        }
        
        function cleanDraw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getCleanPos(e);
            const activeColor = document.querySelector('#colorPicker .color-dot.active');
            const color = activeColor ? activeColor.dataset.color : '#FFFFFF';
            
            cleanCtx.fillStyle = color;
            cleanCtx.beginPath();
            cleanCtx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
            cleanCtx.fill();
        }
        
        function undoClean() {
            if (!window._cleanHistory || window._cleanHistory.length < 2) return;
            window._cleanHistory.pop();
            const prev = window._cleanHistory[window._cleanHistory.length - 1];
            cleanCtx.putImageData(prev, 0, 0);
        }
        
        function saveCleanedImage() {
            if (!cleanCanvas) return;
            const dataUrl = cleanCanvas.toDataURL('image/jpeg', 0.95);
            saveToGallery(dataUrl, 'cleaned_' + Date.now() + '.jpg');
        }

        // ============================================
        // ابزار ۴: بهبود کیفیت عکس
        // ============================================
        
        let enhancedDataUrl = null;
        
        function openEnhanceTool() {
            enhancedDataUrl = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#fdcb6e;margin-bottom:15px;">✨ بهبود کیفیت عکس</h2>
                
                <div class="preview-area" id="enhancePreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="enhanceStatus">یک عکس انتخاب کنید</div>
                
                <div class="slider-container">
                    <span style="font-size:12px;">کم</span>
                    <input type="range" id="enhanceLevel" min="1" max="10" value="5" 
                           oninput="document.getElementById('enhanceValue').textContent=this.value">
                    <span style="font-size:12px;">زیاد</span>
                </div>
                <div style="text-align:center;font-size:12px;color:#aaa;">میزان بهبود: <span id="enhanceValue">5</span>/10</div>
                
                <input type="file" id="enhanceInput" accept="image/*" style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('enhanceInput').click()">
                    📂 انتخاب عکس
                </button>
                
                <button class="btn btn-success" id="enhanceBtn" disabled onclick="doEnhance()">
                    ✨ بهبود کیفیت
                </button>
                
                <div id="enhanceResult"></div>
                
                <button class="btn btn-outline" id="enhanceDownload" disabled onclick="saveToGallery(enhancedDataUrl, 'enhanced_' + Date.now() + '.jpg')">
                    💾 ذخیره در گالری
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            
            let enhanceFile = null;
            document.getElementById('enhanceInput').addEventListener('change', function(e) {
                if (e.target.files.length === 0) return;
                enhanceFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('enhancePreview').innerHTML = `
                        <img src="${ev.target.result}" style="max-width:100%;max-height:200px;border-radius:10px;">
                    `;
                };
                reader.readAsDataURL(enhanceFile);
                document.getElementById('enhanceBtn').disabled = false;
                document.getElementById('enhanceStatus').textContent = 'عکس آماده بهبود است';
            });
            
            document.getElementById('enhanceBtn').addEventListener('click', async function() {
                if (!enhanceFile) return;
                const btn = this;
                btn.disabled = true;
                document.getElementById('enhanceStatus').textContent = '⏳ در حال بهبود...';
                
                try {
                    const { img } = await loadImageFromFile(enhanceFile);
                    const level = parseInt(document.getElementById('enhanceLevel').value);
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    const b = 1 + level * 0.04;
                    const c = 1 + level * 0.06;
                    const s = 1 + level * 0.05;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * b);
                        data[i+1] = Math.min(255, data[i+1] * b);
                        data[i+2] = Math.min(255, data[i+2] * b);
                        
                        for (let j = 0; j < 3; j++) {
                            data[i+j] = ((data[i+j]/255 - 0.5) * c + 0.5) * 255;
                            data[i+j] = Math.max(0, Math.min(255, data[i+j]));
                        }
                        
                        const g = 0.2989*data[i] + 0.5870*data[i+1] + 0.1140*data[i+2];
                        data[i] = Math.min(255, g + s*(data[i] - g));
                        data[i+1] = Math.min(255, g + s*(data[i+1] - g));
                        data[i+2] = Math.min(255, g + s*(data[i+2] - g));
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    enhancedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('enhanceResult').innerHTML = `
                            <div class="comparison-container">
                                <div class="comparison-item">
                                    <img src="${e.target.result}"><p>📷 قبل</p>
                                </div>
                                <div class="comparison-item">
                                    <img src="${enhancedDataUrl}"><p>✨ بعد</p>
                                </div>
                            </div>
                        `;
                    };
                    reader.readAsDataURL(enhanceFile);
                    
                    document.getElementById('enhanceStatus').textContent = '✅ کیفیت بهبود یافت!';
                    document.getElementById('enhanceDownload').disabled = false;
                    btn.disabled = false;
                } catch (error) {
                    document.getElementById('enhanceStatus').textContent = '❌ خطا';
                    btn.disabled = false;
                }
            });
        }

        // ============================================
        // اشتراک‌گذاری
        // ============================================
        
        async function shareImage(dataUrl) {
            // استفاده از Social Sharing Plugin
            if (window.plugins && window.plugins.socialsharing) {
                window.plugins.socialsharing.share(
                    null, null, dataUrl, null,
                    function() { showToast('📤 اشتراک‌گذاری انجام شد'); },
                    function() { saveToGallery(dataUrl, 'image_' + Date.now() + '.jpg'); }
                );
                return;
            }
            
            // Fallback به Web Share API
            const res = await fetch(dataUrl);
            const blob = await res.blob();
            const file = new File([blob], 'image.jpg', { type: 'image/jpeg' });
            
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file], title: 'عکس آماده شد' });
                    showToast('📤 اشتراک‌گذاری انجام شد');
                } catch {
                    saveToGallery(dataUrl, 'image_' + Date.now() + '.jpg');
                }
            } else {
                saveToGallery(dataUrl, 'image_' + Date.now() + '.jpg');
            }
        }

        // بستن مودال
        document.getElementById('toolModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
