<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🔧 جعبه ابزار حرفه‌ای</title>
    
    <!-- کتابخانه‌های CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.0/dist/tesseract.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --accent: #6c5ce7;
            --accent-light: #a855f7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00b894;
            --danger: #ff6b6b;
            --warning: #fdcb6e;
            --info: #74b9ff;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            line-height: 1.6;
        }

        /* اسکرول بار مخفی */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* انیمیشن‌های عمومی */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(108, 92, 231, 0.2); }
        }

        /* کانتینر اصلی */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding: 0 12px 30px;
        }

        /* صفحه */
        .page {
            display: none;
            animation: fadeInScale 0.3s ease;
            padding-bottom: 20px;
        }

        .page.active {
            display: block;
        }

        /* هدر */
        .app-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin: 16px 0;
            text-align: center;
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.5s ease;
        }

        .app-header .logo {
            font-size: 48px;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .app-header .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        /* تولبار ابزار */
        .toolbar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--glass-shadow);
        }

        .toolbar .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .toolbar .back-btn:active {
            transform: scale(0.9);
        }

        .toolbar .tool-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        /* جستجو */
        .search-bar {
            margin: 12px 0;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }

        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        /* دسته‌بندی‌ها */
        .categories {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            overflow-x: auto;
            padding: 4px 0;
            scroll-behavior: smooth;
        }

        .categories::-webkit-scrollbar {
            height: 0;
        }

        .cat-btn {
            padding: 10px 18px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            color: var(--text-secondary);
            border-radius: var(--radius-xl);
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
        }

        .cat-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .cat-btn:active {
            transform: scale(0.95);
        }

        /* استات‌ها */
        .stats-row {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 8px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* کارت ابزار */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .tool-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            animation: fadeInUp 0.5s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .tool-card:active::before {
            left: 100%;
        }

        .tool-card:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }

        .tool-card .tool-icon {
            font-size: 36px;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .tool-card:active .tool-icon {
            animation: pulse 0.3s ease;
        }

        .tool-card .tool-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tool-card .tool-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .tool-card .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
        }

        .tool-card.skeleton {
            background: linear-gradient(90deg, var(--glass-bg) 25%, rgba(255,255,255,0.08) 50%, var(--glass-bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* بخش‌های اخیر و محبوب */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 16px 0 10px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        /* دکمه‌ها */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin: 6px 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            width: auto;
            display: inline-flex;
        }

        /* ورودی‌ها */
        .input-group {
            margin: 12px 0;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* محدوده */
        .range-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
        }

        .range-group input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--glass-border);
            outline: none;
            -webkit-appearance: none;
        }

        .range-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .range-group .range-value {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }

        /* پیش‌نمایش */
        .preview-container {
            background: rgba(0,0,0,0.3);
            border: 2px dashed var(--glass-border);
            border-radius: var(--radius-md);
            padding: 16px;
            margin: 12px 0;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            max-height: 300px;
            overflow-y: auto;
        }

        .preview-container img {
            height: 80px;
            border-radius: 8px;
            border: 2px solid var(--glass-border);
            object-fit: cover;
        }

        .preview-container .thumb-wrapper {
            position: relative;
            display: inline-block;
        }

        .preview-container .remove-btn {
            position: absolute;
            top: -6px;
            left: -6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* مقایسه قبل/بعد */
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }

        .comparison-item {
            text-align: center;
        }

        .comparison-item img {
            width: 100%;
            border-radius: var(--radius-md);
            border: 2px solid var(--glass-border);
        }

        .comparison-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--glass-border);
            border-radius: 3px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-xl);
            font-size: 14px;
            z-index: 10000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* رنگ پیکر */
        .color-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0;
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
        }

        .color-dot.active {
            border-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* Canvas */
        canvas {
            max-width: 100%;
            border-radius: var(--radius-md);
            border: 2px solid var(--glass-border);
        }

        /* Grid helpers */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        /* Modal (فقط برای QR Scanner) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .tool-card {
                padding: 14px 10px;
            }
            .tool-card .tool-icon {
                font-size: 28px;
            }
            .app-header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- صفحه اصلی -->
        <div class="page active" id="page-home">
            <header class="app-header">
                <div class="logo">🔧</div>
                <h1>جعبه ابزار حرفه‌ای</h1>
                <p class="subtitle">۱۵ ابزار قدرتمند پردازش تصویر</p>
            </header>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 جستجوی ابزار..." oninput="filterTools()">
            </div>

            <div class="categories" id="categories">
                <button class="cat-btn active" data-cat="all" onclick="filterByCategory('all', this)">همه</button>
                <button class="cat-btn" data-cat="image" onclick="filterByCategory('image', this)">تصویر</button>
                <button class="cat-btn" data-cat="pdf" onclick="filterByCategory('pdf', this)">PDF</button>
                <button class="cat-btn" data-cat="qr" onclick="filterByCategory('qr', this)">QR</button>
                <button class="cat-btn" data-cat="utility" onclick="filterByCategory('utility', this)">ابزارها</button>
            </div>

            <div class="stats-row" id="statsRow">
                <div class="stat-chip">🕐 اخیراً: <span id="recentTool">-</span></div>
                <div class="stat-chip">⭐ محبوب‌ترین: <span id="popularTool">-</span></div>
                <div class="stat-chip">📊 استفاده: <span id="usageCount">0</span></div>
            </div>

            <div class="tools-grid" id="toolsGrid"></div>
        </div>

        <!-- صفحات ابزارها (داینامیک ساخته می‌شوند) -->
        <div class="page" id="page-tool"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Modal QR Scanner -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <h3 style="text-align:center;margin-bottom:15px;">📷 اسکن QR Code</h3>
            <video id="qrVideo" style="width:100%;border-radius:10px;" autoplay></video>
            <div id="qrResult" style="text-align:center;margin:10px 0;font-size:14px;"></div>
            <button class="btn btn-danger" onclick="stopQRScanner()">❌ بستن</button>
        </div>
    </div>

    <!-- Cordova -->
    <script src="cordova.js"></script>

    <script>
        // ============================================
        // داده‌های ابزارها
        // ============================================
        
        const toolsData = [
            // ابزارهای اصلی (ID 1-4)
            { id: 1, name: '🧩 چسباندن عکس', desc: 'عمودی و افقی', category: 'image', action: 'openStitch' },
            { id: 2, name: '📄 ساخت PDF', desc: 'تصاویر به PDF', category: 'pdf', action: 'openPDF' },
            { id: 3, name: '🧹 پاک‌کن عکس', desc: 'حذف متن از تصویر', category: 'image', action: 'openCleaner' },
            { id: 4, name: '✨ بهبود کیفیت', desc: 'تنظیم نور و رنگ', category: 'image', action: 'openEnhancer' },
            
            // ابزارهای جدید (ID 5-15)
            { id: 5, name: '✂️ تقسیم عکس', desc: 'برش تصاویر بلند', category: 'image', action: 'openSplit' },
            { id: 6, name: '💧 واترمارک', desc: 'متن و لوگو', category: 'image', action: 'openWatermark' },
            { id: 7, name: '📦 فشرده‌سازی', desc: 'کاهش حجم تصویر', category: 'image', action: 'openCompressor' },
            { id: 8, name: '🔄 تبدیل فرمت', desc: 'JPG ↔ PNG ↔ WEBP', category: 'image', action: 'openConverter' },
            { id: 9, name: '📐 تغییر سایز', desc: 'ابعاد دلخواه', category: 'image', action: 'openResize' },
            { id: 10, name: '📱 ساخت QR', desc: 'تولید کد QR', category: 'qr', action: 'openQRGen' },
            { id: 11, name: '📷 اسکن QR', desc: 'دوربین یا عکس', category: 'qr', action: 'openQRScan' },
            { id: 12, name: '📝 OCR متن', desc: 'استخراج متن فارسی', category: 'utility', action: 'openOCR' },
            { id: 13, name: '🎨 انتخاب رنگ', desc: 'از تصویر', category: 'utility', action: 'openColorPicker' },
            { id: 14, name: '🖼️ چسب اسکرین', desc: 'اسکرین‌شات‌ها', category: 'image', action: 'openScreenStitch' },
            { id: 15, name: '📋 پردازش گروهی', desc: 'چندتایی باهم', category: 'utility', action: 'openBatch' }
        ];

        // ============================================
        // حالت برنامه
        // ============================================
        
        const state = {
            currentPage: 'home',
            currentTool: null,
            history: ['home'],
            usageStats: JSON.parse(localStorage.getItem('toolbox_stats') || '{}'),
            recentTools: JSON.parse(localStorage.getItem('toolbox_recent') || '[]'),
            theme: localStorage.getItem('toolbox_theme') || 'dark'
        };

        // ============================================
        // راه‌اندازی
        // ============================================
        
        function init() {
            renderTools();
            updateStats();
            setupBackButton();
            applyTheme();
            
            // گوش دادن به backbutton اندروید
            document.addEventListener('backbutton', handleBackButton, false);
            
            // مدیریت popstate مرورگر
            window.addEventListener('popstate', (e) => {
                if (e.state && e.state.page) {
                    navigateTo(e.state.page, e.state.toolId, false);
                } else {
                    navigateTo('home', null, false);
                }
            });
        }

        // ============================================
        // رندر ابزارها
        // ============================================
        
        function renderTools(filter = 'all', search = '') {
            const grid = document.getElementById('toolsGrid');
            let tools = [...toolsData];
            
            if (filter !== 'all') {
                tools = tools.filter(t => t.category === filter);
            }
            
            if (search) {
                const q = search.toLowerCase();
                tools = tools.filter(t => t.name.includes(q) || t.desc.includes(q));
            }
            
            grid.innerHTML = tools.map((tool, index) => `
                <div class="tool-card" style="animation-delay:${index * 0.05}s" 
                     onclick="openToolPage(${tool.id})" data-id="${tool.id}">
                    <div class="tool-icon">${tool.name.split(' ')[0]}</div>
                    <div class="tool-name">${tool.name.slice(tool.name.indexOf(' ') + 1)}</div>
                    <div class="tool-desc">${tool.desc}</div>
                    ${state.recentTools.includes(tool.id) ? '<div class="badge">اخیر</div>' : ''}
                </div>
            `).join('');
        }

        function filterTools() {
            const search = document.getElementById('searchInput').value;
            const activeCat = document.querySelector('.cat-btn.active')?.dataset?.cat || 'all';
            renderTools(activeCat, search);
        }

        function filterByCategory(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const search = document.getElementById('searchInput').value;
            renderTools(cat, search);
        }

        // ============================================
        // آمار
        // ============================================
        
        function updateStats() {
            document.getElementById('recentTool').textContent = state.recentTools.length > 0 
                ? toolsData.find(t => t.id === state.recentTools[0])?.name.split(' ')[1] || '-' 
                : '-';
            
            // محبوب‌ترین
            const sorted = Object.entries(state.usageStats).sort((a, b) => b[1] - a[1]);
            document.getElementById('popularTool').textContent = sorted.length > 0 
                ? toolsData.find(t => t.id === parseInt(sorted[0][0]))?.name.split(' ')[1] || '-' 
                : '-';
            
            document.getElementById('usageCount').textContent = 
                Object.values(state.usageStats).reduce((a, b) => a + b, 0);
        }

        function trackUsage(toolId) {
            state.usageStats[toolId] = (state.usageStats[toolId] || 0) + 1;
            localStorage.setItem('toolbox_stats', JSON.stringify(state.usageStats));
            
            state.recentTools = [toolId, ...state.recentTools.filter(id => id !== toolId)].slice(0, 5);
            localStorage.setItem('toolbox_recent', JSON.stringify(state.recentTools));
            
            updateStats();
            renderTools();
        }

        // ============================================
        // ناوبری
        // ============================================
        
        function openToolPage(toolId) {
            trackUsage(toolId);
            navigateTo('tool', toolId, true);
        }

        function navigateTo(page, toolId, pushState) {
            state.currentPage = page;
            state.currentTool = toolId;
            
            if (pushState) {
                state.history.push(page);
                window.history.pushState({ page, toolId }, '', page === 'tool' ? `#tool-${toolId}` : '#');
            }
            
            // نمایش صفحه مناسب
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            if (page === 'home') {
                document.getElementById('page-home').classList.add('active');
                document.getElementById('page-tool').classList.remove('active');
            } else if (page === 'tool' && toolId) {
                document.getElementById('page-home').classList.remove('active');
                document.getElementById('page-tool').classList.add('active');
                renderToolPage(toolId);
            }
            
            window.scrollTo(0, 0);
        }

        function goBack() {
            if (state.history.length > 1) {
                state.history.pop();
                const prev = state.history[state.history.length - 1];
                
                if (prev === 'home') {
                    navigateTo('home', null, false);
                    window.history.back();
                } else {
                    navigateTo('tool', state.currentTool, false);
                    window.history.back();
                }
            } else {
                // خروج از برنامه
                if (navigator.app && navigator.app.exitApp) {
                    navigator.app.exitApp();
                }
            }
        }

        function handleBackButton() {
            if (state.currentPage === 'home') {
                if (navigator.app && navigator.app.exitApp) {
                    navigator.app.exitApp();
                }
            } else {
                goBack();
            }
        }

        function setupBackButton() {
            if (typeof cordova !== 'undefined') {
                document.addEventListener('backbutton', handleBackButton, false);
            }
        }

        // رندر صفحه ابزار

        // ============================================
        // Toast
        // ============================================
        
        let toastTimeout;
        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ============================================
        // ذخیره در گالری
        // ============================================
        
        function saveToGallery(dataUrl, filename) {
            // تلاش با Median Bridge
            if (typeof median !== 'undefined' && median.file && median.file.save) {
                try {
                    median.file.save({ data: dataUrl, filename, folder: 'Downloads' });
                    showToast('💾 ذخیره در گالری');
                    return;
                } catch(e) {}
            }
            
            // تلاش با Cordova
            if (typeof cordova !== 'undefined' && window.requestFileSystem) {
                window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, (fs) => {
                    fs.root.getFile(filename, { create: true }, (fileEntry) => {
                        fileEntry.createWriter((writer) => {
                            writer.onwriteend = () => {
                                if (window.MediaScanner) {
                                    window.MediaScanner.scanFile(fileEntry.toURL(), 'image/jpeg', () => {
                                        showToast('💾 ذخیره در گالری');
                                    });
                                }
                            };
                            const byteString = atob(dataUrl.split(',')[1]);
                            const ab = new ArrayBuffer(byteString.length);
                            const ia = new Uint8Array(ab);
                            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                            writer.write(new Blob([ia], { type: 'image/jpeg' }));
                        });
                    });
                });
                return;
            }
            
            // Fallback
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('💾 فایل ذخیره شد');
        }

        function saveBlobToGallery(blob, filename) {
            if (typeof median !== 'undefined' && median.file && median.file.save) {
                const reader = new FileReader();
                reader.onload = () => {
                    median.file.save({ data: reader.result, filename, folder: 'Downloads' });
                    showToast('💾 ذخیره شد');
                };
                reader.readAsDataURL(blob);
                return;
            }
            
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('💾 فایل ذخیره شد');
        }

        // ============================================
        // توابع کمکی
        // ============================================
        
        function loadImageFromFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve({ img, dataUrl: e.target.result });
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function createFileInput(accept = 'image/*', multiple = false) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = accept;
            input.multiple = multiple;
            input.style.display = 'none';
            document.body.appendChild(input);
            return input;
        }

        // ============================================
        // ابزار ۱: چسباندن عکس
        // ============================================
        
        function openStitch() {
            let stitchFiles = [];
            let stitchMode = 'vertical';
            let stitchQuality = 1.0;
            let stitchedDataUrl = null;
            
            document.getElementById('toolContent').innerHTML = `
                <div class="input-group">
                    <label>حالت چسباندن:</label>
                    <div class="grid-2">
                        <button class="btn btn-primary btn-sm active" id="stitchModeV" onclick="setStitchMode('vertical')">📐 عمودی</button>
                        <button class="btn btn-outline btn-sm" id="stitchModeH" onclick="setStitchMode('horizontal')">📏 افقی</button>
                    </div>
                </div>
                
                <div class="preview-container" id="stitchPreview">
                    <span style="color:var(--text-secondary)">تصویری انتخاب نشده</span>
                </div>
                
                <div class="range-group">
                    <span>کیفیت:</span>
                    <input type="range" id="stitchQuality" min="10" max="100" value="100" oninput="document.getElementById('stitchQualityVal').textContent=this.value+'%'">
                    <span class="range-value" id="stitchQualityVal">100%</span>
                </div>
                
                <button class="btn btn-primary" onclick="selectStitchFiles()">📂 انتخاب تصاویر</button>
                <button class="btn btn-success" id="stitchBtn" disabled onclick="doStitch()">✂️ چسباندن</button>
                
                <div id="stitchResult"></div>
                
                <button class="btn btn-outline" id="stitchSave" disabled onclick="saveToGallery(window._stitchedDataUrl, 'stitched_'+Date.now()+'.jpg')">💾 ذخیره</button>
                <button class="btn btn-outline" id="stitchShare" disabled onclick="shareImage(window._stitchedDataUrl)">📤 اشتراک‌گذاری</button>
            `;
            
            window.setStitchMode = (mode) => {
                stitchMode = mode;
                document.getElementById('stitchModeV').className = mode === 'vertical' ? 'btn btn-primary btn-sm active' : 'btn btn-outline btn-sm';
                document.getElementById('stitchModeH').className = mode === 'horizontal' ? 'btn btn-primary btn-sm active' : 'btn btn-outline btn-sm';
            };
            
            window.selectStitchFiles = () => {
                const input = createFileInput('image/*', true);
                input.onchange = (e) => {
                    stitchFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                    if (stitchFiles.length === 0) return;
                    
                    const preview = document.getElementById('stitchPreview');
                    preview.innerHTML = '';
                    stitchFiles.forEach((file, i) => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const wrapper = document.createElement('span');
                            wrapper.className = 'thumb-wrapper';
                            wrapper.innerHTML = `
                                <img src="${ev.target.result}" style="height:80px;border-radius:8px;">
                                <button class="remove-btn" onclick="removeStitchFile(${i})">×</button>
                            `;
                            preview.appendChild(wrapper);
                        };
                        reader.readAsDataURL(file);
                    });
                    
                    document.getElementById('stitchBtn').disabled = false;
                };
                input.click();
            };
            
            window.removeStitchFile = (index) => {
                stitchFiles.splice(index, 1);
                const preview = document.getElementById('stitchPreview');
                preview.children[index]?.remove();
                if (stitchFiles.length === 0) {
                    preview.innerHTML = '<span style="color:var(--text-secondary)">تصویری انتخاب نشده</span>';
                    document.getElementById('stitchBtn').disabled = true;
                }
            };
            
            window.doStitch = async () => {
                if (stitchFiles.length === 0) return;
                const btn = document.getElementById('stitchBtn');
                btn.disabled = true;
                
                stitchQuality = parseInt(document.getElementById('stitchQuality').value) / 100;
                
                const images = [];
                for (let file of stitchFiles) {
                    const { img } = await loadImageFromFile(file);
                    images.push(img);
                }
                
                let canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                if (stitchMode === 'vertical') {
                    let maxW = 0, totalH = 0;
                    images.forEach(img => { if (img.width > maxW) maxW = img.width; totalH += img.height; });
                    canvas.width = maxW; canvas.height = totalH;
                    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, maxW, totalH);
                    let y = 0;
                    images.forEach(img => { ctx.drawImage(img, (maxW - img.width) / 2, y); y += img.height; });
                } else {
                    let maxH = 0, totalW = 0;
                    images.forEach(img => { if (img.height > maxH) maxH = img.height; totalW += img.width; });
                    canvas.width = totalW; canvas.height = maxH;
                    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, totalW, maxH);
                    let x = 0;
                    images.forEach(img => { ctx.drawImage(img, x, (maxH - img.height) / 2); x += img.width; });
                }
                
                const dataUrl = canvas.toDataURL('image/jpeg', stitchQuality);
                window._stitchedDataUrl = dataUrl;
                
                document.getElementById('stitchResult').innerHTML = `
                    <p style="color:var(--success);text-align:center;margin:10px 0;">✅ چسباندن انجام شد</p>
                    <img src="${dataUrl}" style="width:100%;border-radius:10px;">
                `;
                document.getElementById('stitchSave').disabled = false;
                document.getElementById('stitchShare').disabled = false;
                btn.disabled = false;
            };
        }

        // ============================================
        // ابزار ۲: ساخت PDF
        // ============================================
        
        function openPDF() {
            let pdfFiles = [];
            let pdfBlob = null;
            
            document.getElementById('toolContent').innerHTML = `
                <div class="input-group">
                    <label>اندازه کاغذ:</label>
                    <select id="pdfSize">
                        <option value="a4">A4</option>
                        <option value="a5">A5</option>
                        <option value="letter">Letter</option>
                    </select>
                </div>
                
                <div class="preview-container" id="pdfPreview">
                    <span style="color:var(--text-secondary)">تصویری انتخاب نشده</span>
                </div>
                
                <button class="btn btn-primary" onclick="selectPDFFiles()">📂 انتخاب تصاویر</button>
                <button class="btn btn-success" id="pdfBtn" disabled onclick="doPDF()">📄 ساخت PDF</button>
                
                <div id="pdfResult"></div>
                
                <button class="btn btn-outline" id="pdfSave" disabled onclick="saveBlobToGallery(window._pdfBlob, 'document_'+Date.now()+'.pdf')">💾 ذخیره</button>
            `;
            
            window.selectPDFFiles = () => {
                const input = createFileInput('image/*', true);
                input.onchange = (e) => {
                    pdfFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                    if (pdfFiles.length === 0) return;
                    
                    const preview = document.getElementById('pdfPreview');
                    preview.innerHTML = '';
                    pdfFiles.forEach((file, i) => {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const wrapper = document.createElement('span');
                            wrapper.className = 'thumb-wrapper';
                            wrapper.innerHTML = `
                                <img src="${ev.target.result}" style="height:80px;">
                                <button class="remove-btn" onclick="removePDFFile(${i})">×</button>
                            `;
                            preview.appendChild(wrapper);
                        };
                        reader.readAsDataURL(file);
                    });
                    
                    document.getElementById('pdfBtn').disabled = false;
                };
                input.click();
            };
            
            window.removePDFFile = (index) => {
                pdfFiles.splice(index, 1);
                const preview = document.getElementById('pdfPreview');
                preview.children[index]?.remove();
            };
            
            window.doPDF = async () => {
                if (pdfFiles.length === 0) return;
                const btn = document.getElementById('pdfBtn');
                btn.disabled = true;
                
                const { jsPDF } = window.jspdf;
                const sizes = { a4: [210, 297], a5: [148, 210], letter: [216, 279] };
                const [pw, ph] = sizes[document.getElementById('pdfSize').value];
                const pdf = new jsPDF('p', 'mm', [pw, ph]);
                
                for (let i = 0; i < pdfFiles.length; i++) {
                    if (i > 0) pdf.addPage();
                    const { img, dataUrl } = await loadImageFromFile(pdfFiles[i]);
                    const m = 10;
                    let iw = pw - m * 2, ih = (img.height / img.width) * iw;
                    if (ih > ph - m * 2) { ih = ph - m * 2; iw = (img.width / img.height) * ih; }
                    pdf.addImage(dataUrl, 'JPEG', (pw - iw) / 2, (ph - ih) / 2, iw, ih);
                }
                
                window._pdfBlob = pdf.output('blob');
                document.getElementById('pdfResult').innerHTML = '<p style="color:var(--success);text-align:center;margin:10px 0;">✅ PDF آماده شد</p>';
                document.getElementById('pdfSave').disabled = false;
                btn.disabled = false;
            };
        }

        // ============================================
        // ابزار ۳: پاک‌کن عکس
        // ============================================
        
        function openCleaner() {
            let cleanCanvas, cleanCtx, isDrawing = false, brushSize = 20;
            let history = [], historyIndex = -1;
            
            document.getElementById('toolContent').innerHTML = `
                <div class="range-group">
                    <span>سایز قلم:</span>
                    <input type="range" id="cleanerSize" min="5" max="60" value="20" oninput="document.getElementById('cleanerSizeVal').textContent=this.value;brushSize=parseInt(this.value)">
                    <span class="range-value" id="cleanerSizeVal">20</span>
                </div>
                
                <div class="color-grid">
                    <div class="color-dot active" style="background:#fff" data-color="#FFFFFF" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#000" data-color="#000000" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#808080" data-color="#808080" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#F5DEB3" data-color="#F5DEB3" onclick="selectCleanColor(this)"></div>
                    <div class="color-dot" style="background:#E8E8E8" data-color="#E8E8E8" onclick="selectCleanColor(this)"></div>
                </div>
                
                <div style="text-align:center;margin:10px 0;">
                    <canvas id="cleanCanvas" style="display:none;max-width:100%;border-radius:10px;cursor:crosshair;"></canvas>
                </div>
                
                <button class="btn btn-primary" onclick="selectCleanerImage()">📂 انتخاب عکس</button>
                
                <div class="grid-2">
                    <button class="btn btn-outline btn-sm" onclick="undoClean()" id="cleanerUndo" disabled>↩️ بازگشت</button>
                    <button class="btn btn-outline btn-sm" onclick="redoClean()" id="cleanerRedo" disabled>↪️ بعدی</button>
                </div>
                
                <button class="btn btn-success" id="cleanerSave" disabled onclick="saveCleanedImage()">💾 ذخیره</button>
            `;
            
            window.selectCleanColor = (dot) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
            };
            
            window.selectCleanerImage = () => {
                const input = createFileInput();
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                            cleanCanvas = document.getElementById('cleanCanvas');
                            cleanCanvas.style.display = 'block';
                            const maxW = Math.min(img.width, 350);
                            const scale = maxW / img.width;
                            cleanCanvas.width = maxW;
                            cleanCanvas.height = img.height * scale;
                            cleanCtx = cleanCanvas.getContext('2d');
                            cleanCtx.drawImage(img, 0, 0, cleanCanvas.width, cleanCanvas.height);
                            
                            history = [cleanCtx.getImageData(0, 0, cleanCanvas.width, cleanCanvas.height)];
                            historyIndex = 0;
                            
                            document.getElementById('cleanerSave').disabled = false;
                            document.getElementById('cleanerUndo').disabled = false;
                            
                            cleanCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; cleanDraw(e); });
                            cleanCanvas.addEventListener('touchend', () => { isDrawing = false; saveHistory(); });
                            cleanCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); cleanDraw(e); });
                            cleanCanvas.addEventListener('mousedown', (e) => { isDrawing = true; cleanDraw(e); });
                            cleanCanvas.addEventListener('mouseup', () => { isDrawing = false; saveHistory(); });
                            cleanCanvas.addEventListener('mousemove', (e) => { if (isDrawing) cleanDraw(e); });
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            };
            
            function cleanDraw(e) {
                if (!isDrawing || !cleanCtx) return;
                const rect = cleanCanvas.getBoundingClientRect();
                const sx = cleanCanvas.width / rect.width, sy = cleanCanvas.height / rect.height;
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                const x = (cx - rect.left) * sx, y = (cy - rect.top) * sy;
                
                const activeColor = document.querySelector('.color-dot.active');
                cleanCtx.fillStyle = activeColor ? activeColor.dataset.color : '#FFFFFF';
                cleanCtx.beginPath();
                cleanCtx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
                cleanCtx.fill();
            }
            
            function saveHistory() {
                history = history.slice(0, historyIndex + 1);
                history.push(cleanCtx.getImageData(0, 0, cleanCanvas.width, cleanCanvas.height));
                historyIndex++;
                if (history.length > 50) { history.shift(); historyIndex--; }
                document.getElementById('cleanerRedo').disabled = true;
            }
            
            window.undoClean = () => {
                if (historyIndex > 0) {
                    historyIndex--;
                    cleanCtx.putImageData(history[historyIndex], 0, 0);
                    document.getElementById('cleanerRedo').disabled = false;
                }
            };
            
            window.redoClean = () => {
                if (historyIndex < history.length - 1) {
                    historyIndex++;

        function openEnhancer() {
            let enhanceFile = null, enhancedDataUrl = null;
            
            document.getElementById('toolContent').innerHTML = `
                <div class="range-group"><span>روشنایی:</span><input type="range" id="enhBright" min="0" max="200" value="100" oninput="document.getElementById('enhBrightVal').textContent=this.value"><span class="range-value" id="enhBrightVal">100</span></div>
                <div class="range-group"><span>کنتراست:</span><input type="range" id="enhContrast" min="0" max="200" value="100" oninput="document.getElementById('enhContrastVal').textContent=this.value"><span class="range-value" id="enhContrastVal">100</span></div>
                <div class="range-group"><span>اشباع:</span><input type="range" id="enhSaturate" min="0" max="200" value="100" oninput="document.getElementById('enhSaturateVal').textContent=this.value"><span class="range-value" id="enhSaturateVal">100</span></div>
                <div class="range-group"><span>شارپنس:</span><input type="range" id="enhSharpen" min="0" max="100" value="0" oninput="document.getElementById('enhSharpenVal').textContent=this.value"><span class="range-value" id="enhSharpenVal">0</span></div>
                
                <div class="preview-container" id="enhPreview"><span style="color:var(--text-secondary)">عکسی انتخاب نشده</span></div>
                
                <button class="btn btn-primary" onclick="selectEnhanceFile()">📂 انتخاب عکس</button>
                <button class="btn btn-success" id="enhBtn" disabled onclick="doEnhance()">✨ اعمال</button>
                
                <div id="enhResult"></div>
                <button class="btn btn-outline" id="enhSave" disabled onclick="saveToGallery(window._enhancedDataUrl, 'enhanced_'+Date.now()+'.jpg')">💾 ذخیره</button>
            `;
            
            window.selectEnhanceFile = () => {
                const input = createFileInput();
                input.onchange = (e) => {
                    enhanceFile = e.target.files[0];
                    if (!enhanceFile) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        document.getElementById('enhPreview').innerHTML = `<img src="${ev.target.result}" style="max-width:100%;max-height:200px;border-radius:10px;">`;
                    };
                    reader.readAsDataURL(enhanceFile);
                    document.getElementById('enhBtn').disabled = false;
                };
                input.click();
            };
            
            window.doEnhance = async () => {
                if (!enhanceFile) return;
                const btn = document.getElementById('enhBtn');
                btn.disabled = true;
                
                const { img } = await loadImageFromFile(enhanceFile);
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const bright = parseInt(document.getElementById('enhBright').value) / 100;
                const contrast = parseInt(document.getElementById('enhContrast').value) / 100;
                const saturate = parseInt(document.getElementById('enhSaturate').value) / 100;
                const sharpen = parseInt(document.getElementById('enhSharpen').value) / 100;
                
                for (let i = 0; i < data.length; i += 4) {
                    // Brightness
                    data[i] = Math.min(255, data[i] * bright);
                    data[i+1] = Math.min(255, data[i+1] * bright);
                    data[i+2] = Math.min(255, data[i+2] * bright);
                    
                    // Contrast
                    for (let j = 0; j < 3; j++) {
                        data[i+j] = ((data[i+j]/255 - 0.5) * contrast + 0.5) * 255;
                        data[i+j] = Math.max(0, Math.min(255, data[i+j]));
                    }
                    
                    // Saturation
                    const g = 0.2989*data[i] + 0.5870*data[i+1] + 0.1140*data[i+2];
                    data[i] = Math.min(255, g + saturate*(data[i] - g));
                    data[i+1] = Math.min(255, g + saturate*(data[i+1] - g));
                    data[i+2] = Math.min(255, g + saturate*(data[i+2] - g));
                }
                
                ctx.putImageData(imageData, 0, 0);
                
                // Sharpen
                if (sharpen > 0) {
                    const sharpImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
                    // Simplified sharpen
                    ctx.putImageData(sharpImageData, 0, 0);
                }
                
                enhancedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                window._enhancedDataUrl = enhancedDataUrl;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('enhResult').innerHTML = `
                        <div class="comparison">
                            <div class="comparison-item"><img src="${e.target.result}"><div class="label">📷 قبل</div></div>
                            <div class="comparison-item"><img src="${enhancedDataUrl}"><div class="label">✨ بعد</div></div>
                        </div>
                    `;
                };
                reader.readAsDataURL(enhanceFile);
                
                document.getElementById('enhSave').disabled = false;
                btn.disabled = false;
            };
        }

                                const y = Math.floor((e2.clientY - rect.top) * sy);
                                const pixel = ctx.getImageData(x, y, 1, 1).data;
                                const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join('');

                                    <div style="width:60px;height:60px;background:${hex};border-radius:10px;margin:0 auto;border:2px solid white;"></div>

                input.click();

                const images = [];
                for (let f of window._screenFiles) {
                    const { img } = await loadImageFromFile(f);
                    images.push(img);
                }
                
                // تشخیص هم‌پوشانی و چسباندن
                let totalH = images[0].height;
                const w = images[0].width;
                for (let i = 1; i < images.length; i++) {
                    totalH += images[i].height - 50; // overlap guess
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = totalH;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, totalH);
                
                let y = 0;
                images.forEach(img => {
                    ctx.drawImage(img, 0, y);
                    y += img.height - 50;
                });
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                document.getElementById('screenStitchResult').innerHTML = `<img src="${dataUrl}" style="width:100%;border-radius:10px;">`;
                saveToGallery(dataUrl, 'screen_stitch_' + Date.now() + '.jpg');
            };
        }

        function openBatch() {
            document.getElementById('toolContent').innerHTML = `
                <div class="input-group"><label>عملیات گروهی:</label><select id="batchOp"><option value="watermark">واترمارک</option><option value="compress">فشرده‌سازی</option><option value="resize">تغییر سایز</option></select></div>
                <button class="btn btn-primary" onclick="selectBatchFiles()">📂 انتخاب تصاویر</button>
                <button class="btn btn-success" onclick="doBatch()">📋 اجرای گروهی</button>
                <div id="batchResult"></div>
            `;
            
            window.selectBatchFiles = () => {
                const input = createFileInput('image/*', true);
                input.onchange = (e) => {
                    window._batchFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
                    showToast(`✅ ${window._batchFiles.length} تصویر انتخاب شد`);
                };
                input.click();
            };
            
            window.doBatch = async () => {
                if (!window._batchFiles || window._batchFiles.length === 0) { showToast('⚠️ تصاویر را انتخاب کن'); return; }
                const op = document.getElementById('batchOp').value;
                showToast(`📋 پردازش ${window._batchFiles.length} تصویر...`);
                
                for (let file of window._batchFiles) {
                    const { img } = await loadImageFromFile(file);
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    if (op === 'watermark') {
                        ctx.globalAlpha = 0.5;
                        ctx.font = '40px Arial';
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillText('© 2024', img.width/2, img.height/2);
                    }
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', op === 'compress' ? 0.5 : 0.95);
                    saveToGallery(dataUrl, `batch_${op}_${Date.now()}.jpg`);
                    await new Promise(r => setTimeout(r, 300));
                }
                showToast('✅ پردازش گروهی کامل شد');
            };
        }

        // ============================================
        // اشتراک‌گذاری
        // ============================================
        
        async function shareImage(dataUrl) {
            const res = await fetch(dataUrl);
            const blob = await res.blob();
            const file = new File([blob], 'image.jpg', { type: 'image/jpeg' });
            
            if (navigator.share && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file], title: 'عکس' });
                    showToast('📤 اشتراک‌گذاری شد');
                } catch { saveToGallery(dataUrl, 'image_' + Date.now() + '.jpg'); }
            } else {
                saveToGallery(dataUrl, 'image_' + Date.now() + '.jpg');
            }
        }

        // ============================================
        // شروع برنامه
        // ============================================
        
        document.addEventListener('DOMContentLoaded', init);
        if (typeof cordova !== 'undefined') {
            document.addEventListener('deviceready', init, false);
        }
    </script>
</body>
