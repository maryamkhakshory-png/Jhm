<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>🔧 جعبه ابزار حرفه‌ای - ۴ ابزار قدرتمند</title>
    
    <!-- کتابخانه‌ها -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jpeg-js/0.4.4/jpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6c5ce7;
            --dark: #1a1a2e;
            --darker: #16213e;
            --card-bg: #2d3436;
            --text: #dfe6e9;
            --text-secondary: #b2bec3;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
            --accent: #00cec9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #dfe6e9;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            padding-bottom: 30px;
        }

        .header {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }

        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .subtitle { font-size: 13px; opacity: 0.9; }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tool-card {
            background: #2d3436;
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .tool-card:active { transform: scale(0.95); }
        .tool-card:hover { border-color: #6c5ce7; }

        .tool-icon { font-size: 40px; margin-bottom: 10px; }
        .tool-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        .tool-desc { font-size: 11px; color: #b2bec3; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #2d3436;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: sticky;
            top: 0;
            float: left;
            font-size: 24px;
            cursor: pointer;
            color: #b2bec3;
            z-index: 10;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b894;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin: 8px 0;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; }
        .btn-success { background: #00b894; color: white; }
        .btn-warning { background: #fdcb6e; color: #000; }
        .btn-danger { background: #d63031; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6c5ce7; color: #6c5ce7; }

        .preview-area {
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            max-height: 250px;
        }

        .thumb {
            height: 70px;
            border-radius: 8px;
            border: 2px solid #444;
        }

        .status-text {
            margin: 10px 0;
            font-size: 13px;
            color: #b2bec3;
            text-align: center;
            min-height: 20px;
        }

        .info-box {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            font-size: 12px;
            color: #aaa;
            border-right: 3px solid #6c5ce7;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #444;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #6c5ce7;
            cursor: pointer;
        }

        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .comparison-item {
            text-align: center;
        }

        .comparison-item img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #444;
        }

        .comparison-item p {
            font-size: 12px;
            margin-top: 5px;
            color: #b2bec3;
        }

        @media (max-width: 350px) {
            .tools-grid { gap: 8px; }
            .tool-card { padding: 15px 10px; }
            .tool-icon { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🔧 جعبه ابزار حرفه‌ای</h1>
            <p class="subtitle">۴ ابزار قدرتمند و کاربردی</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card" onclick="openTool('stitch')">
                <div class="tool-icon">🧩</div>
                <div class="tool-name">چسبوندن عکس</div>
                <div class="tool-desc">عمودی با کیفیت ۱۰۰٪</div>
            </div>
            
            <div class="tool-card" onclick="openTool('pdf')">
                <div class="tool-icon">📄</div>
                <div class="tool-name">تبدیل به PDF</div>
                <div class="tool-desc">عکس‌ها به PDF</div>
            </div>
            
            <div class="tool-card" onclick="openTool('cleaner')">
                <div class="tool-icon">🧹</div>
                <div class="tool-name">کلینر حرفه‌ای</div>
                <div class="tool-desc">iBisPaint X + Retouch</div>
            </div>
            
            <div class="tool-card" onclick="openTool('enhance')">
                <div class="tool-icon">✨</div>
                <div class="tool-name">بهبود کیفیت</div>
                <div class="tool-desc">روشن‌تر و شفاف‌تر</div>
            </div>
        </div>

        <div class="modal" id="toolModal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <div id="modalContent"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
        
        <canvas id="hiddenCanvas" style="display:none;"></canvas>
    </div>

    <script>
        // ============================================
        // توابع عمومی
        // ============================================
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(window._tt);
            window._tt = setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        function closeModal() {
            document.getElementById('toolModal').classList.remove('show');
        }
        
        function openTool(tool) {
            switch(tool) {
                case 'stitch': openStitchTool(); break;
                case 'pdf': openPDFTool(); break;
                case 'cleaner': openCleanerTool(); break;
                case 'enhance': openEnhanceTool(); break;
            }
        }

        // ============================================
        // ابزار ۱: چسبوندن عکس عمودی
        // ============================================
        
        let stitchFiles = [];
        
        function openStitchTool() {
            stitchFiles = [];
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#ffcc00;margin-bottom:15px;">🧩 چسبوندن عکس عمودی</h2>
                
                <div class="info-box">
                    💡 خروجی با <b>فرمت JPG و کیفیت ۱۰۰٪</b> ذخیره می‌شود.<br>
                    حجم نهایی ≈ مجموع حجم عکس‌های اصلی
                </div>
                
                <div class="preview-area" id="stitchPreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="stitchStatus">آماده برای انتخاب تصاویر</div>
                
                <input type="file" id="stitchInput" accept="image/*" multiple style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('stitchInput').click()">
                    📂 انتخاب عکس‌ها
                </button>
                
                <button class="btn btn-success" id="stitchBtn" disabled onclick="stitchImages()">
                    ✂️ چسبوندن و ساختن فایل
                </button>
                
                <button class="btn btn-outline" id="stitchDownload" disabled onclick="downloadStitchResult()">
                    💾 ذخیره در گالری
                </button>
                
                <button class="btn btn-outline" id="stitchShare" disabled onclick="shareStitchResult()">
                    📤 اشتراک‌گذاری
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            
            document.getElementById('stitchInput').addEventListener('change', handleStitchFiles);
        }
        
        function handleStitchFiles(e) {
            stitchFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (stitchFiles.length === 0) return;
            
            updateStitchPreview();
            document.getElementById('stitchBtn').disabled = false;
            document.getElementById('stitchStatus').textContent = `${stitchFiles.length} عکس انتخاب شد`;
        }
        
        function updateStitchPreview() {
            const preview = document.getElementById('stitchPreview');
            preview.innerHTML = '';
            stitchFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'thumb';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
        
        async function stitchImages() {
            if (stitchFiles.length === 0) return;
            
            const btn = document.getElementById('stitchBtn');
            btn.disabled = true;
            document.getElementById('stitchStatus').textContent = '⏳ در حال پردازش...';
            
            try {
                const imagesData = [];
                let maxWidth = 0;
                let totalHeight = 0;
                
                for (let file of stitchFiles) {
                    const imgData = await getImageData(file);
                    imagesData.push(imgData);
                    if (imgData.width > maxWidth) maxWidth = imgData.width;
                    totalHeight += imgData.height;
                }
                
                const canvas = document.getElementById('hiddenCanvas');
                canvas.width = maxWidth;
                canvas.height = totalHeight;
                const ctx = canvas.getContext('2d');
                
                let yOffset = 0;
                for (let imgData of imagesData) {
                    const img = await createImageFromData(imgData);
                    const xOffset = Math.floor((maxWidth - imgData.width) / 2);
                    ctx.drawImage(img, xOffset, yOffset);
                    yOffset += imgData.height;
                }
                
                canvas.toBlob((blob) => {
                    window.stitchBlob = blob;
                    const sizeKB = (blob.size / 1024).toFixed(0);
                    document.getElementById('stitchStatus').textContent = `✅ آماده! حجم: ${sizeKB} KB`;
                    document.getElementById('stitchDownload').disabled = false;
                    document.getElementById('stitchShare').disabled = false;
                    btn.disabled = false;
                }, 'image/jpeg', 1.0);
                
            } catch (error) {
                document.getElementById('stitchStatus').textContent = '❌ خطا: ' + error.message;
                btn.disabled = false;
            }
        }
        
        function downloadStitchResult() {
            if (!window.stitchBlob) return;
            const url = URL.createObjectURL(window.stitchBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `stitched_${Date.now()}.jpg`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 ذخیره شد');
        }
        
        async function shareStitchResult() {
            if (!window.stitchBlob) return;
            const file = new File([window.stitchBlob], "stitched.jpg", { type: "image/jpeg" });
            if (navigator.share && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file], title: 'عکس چسبیده' });
                } catch {}
            } else {
                downloadStitchResult();
            }
        }

        // ============================================
        // ابزار ۲: تبدیل به PDF
        // ============================================
        
        let pdfFiles = [];
        
        function openPDFTool() {
            pdfFiles = [];
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#ffcc00;margin-bottom:15px;">📄 تبدیل عکس به PDF</h2>
                
                <div class="preview-area" id="pdfPreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="pdfStatus">انتخاب عکس‌ها برای تبدیل به PDF</div>
                
                <input type="file" id="pdfInput" accept="image/*" multiple style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('pdfInput').click()">
                    📂 انتخاب عکس‌ها
                </button>
                
                <button class="btn btn-success" id="pdfBtn" disabled onclick="convertToPDF()">
                    📄 تبدیل به PDF
                </button>
                
                <button class="btn btn-outline" id="pdfDownload" disabled onclick="downloadPDF()">
                    💾 ذخیره PDF
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            document.getElementById('pdfInput').addEventListener('change', handlePDFFiles);
        }
        
        function handlePDFFiles(e) {
            pdfFiles = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (pdfFiles.length === 0) return;
            
            const preview = document.getElementById('pdfPreview');
            preview.innerHTML = '';
            pdfFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'thumb';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            
            document.getElementById('pdfBtn').disabled = false;
            document.getElementById('pdfStatus').textContent = `${pdfFiles.length} عکس انتخاب شد`;
        }
        
        async function convertToPDF() {
            if (pdfFiles.length === 0) return;
            
            const btn = document.getElementById('pdfBtn');
            btn.disabled = true;
            document.getElementById('pdfStatus').textContent = '⏳ در حال ساخت PDF...';
            
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                
                for (let i = 0; i < pdfFiles.length; i++) {
                    if (i > 0) pdf.addPage();
                    
                    const imgData = await readFileAsDataURL(pdfFiles[i]);
                    const img = await loadImage(imgData);
                    
                    const pageWidth = pdf.internal.pageFormat.getWidth();
                    const pageHeight = pdf.internal.pageFormat.getHeight();
                    
                    let imgWidth = pageWidth - 20;
                    let imgHeight = (img.height / img.width) * imgWidth;
                    
                    if (imgHeight > pageHeight - 20) {
                        imgHeight = pageHeight - 20;
                        imgWidth = (img.width / img.height) * imgHeight;
                    }
                    
                    const x = (pageWidth - imgWidth) / 2;
                    const y = (pageHeight - imgHeight) / 2;
                    
                    pdf.addImage(imgData, 'JPEG', x, y, imgWidth, imgHeight);
                }
                
                window.pdfBlob = pdf.output('blob');
                document.getElementById('pdfStatus').textContent = '✅ PDF آماده شد!';
                document.getElementById('pdfDownload').disabled = false;
                btn.disabled = false;
                
            } catch (error) {
                document.getElementById('pdfStatus').textContent = '❌ خطا: ' + error.message;
                btn.disabled = false;
            }
        }
        
        function downloadPDF() {
            if (!window.pdfBlob) return;
            const url = URL.createObjectURL(window.pdfBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `document_${Date.now()}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 PDF ذخیره شد');
        }

        // ============================================
        // ابزار ۳: کلینر حرفه‌ای (iBisPaint X + Retouch)
        // ============================================
        
        function openCleanerTool() {
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#ffcc00;margin-bottom:15px;">🧹 کلینر حرفه‌ای</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div style="background:#1a1a1a;border-radius:15px;padding:20px;text-align:center;cursor:pointer;" onclick="cleanApp('ibisPaint')">
                        <div style="font-size:50px;margin-bottom:10px;">🎨</div>
                        <div style="font-weight:bold;font-size:16px;margin-bottom:5px;">iBisPaint X</div>
                        <div style="font-size:11px;color:#aaa;">پاکسازی کامل</div>
                    </div>
                    
                    <div style="background:#1a1a1a;border-radius:15px;padding:20px;text-align:center;cursor:pointer;" onclick="cleanApp('retouch')">
                        <div style="font-size:50px;margin-bottom:10px;">🖼️</div>
                        <div style="font-weight:bold;font-size:16px;margin-bottom:5px;">Retouch</div>
                        <div style="font-size:11px;color:#aaa;">بهینه‌سازی</div>
                    </div>
                </div>
                
                <div class="info-box" id="cleanerInfo">
                    🧹 انتخاب کنید کدام برنامه را پاکسازی کنید
                </div>
                
                <div id="cleanerActions"></div>
                
                <button class="btn btn-danger" onclick="closeModal()">❌ بستن</button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
        }
        
        function cleanApp(app) {
            const info = document.getElementById('cleanerInfo');
            const actions = document.getElementById('cleanerActions');
            
            if (app === 'ibisPaint') {
                info.innerHTML = '🎨 <b>در حال پاکسازی iBisPaint X...</b><br>• حذف کش‌های موقت<br>• پاکسازی فایل‌های اضافی<br>• بهینه‌سازی فضای ذخیره‌سازی';
                
                actions.innerHTML = `
                    <button class="btn btn-success" onclick="performIbisPaintClean()">
                        🧹 شروع پاکسازی iBisPaint X
                    </button>
                    <div class="info-box" style="margin-top:10px;">
                        📁 <b>موارد پاکسازی:</b><br>
                        • کش برنامه<br>
                        • فایل‌های موقت<br>
                        • تاریخچه غیرضروری<br>
                        • thumbnail های اضافی
                    </div>
                `;
            } else {
                info.innerHTML = '🖼️ <b>در حال بهینه‌سازی Retouch...</b><br>• حذف پروژه‌های ناتمام<br>• پاکسازی export های قدیمی<br>• فشرده‌سازی داده‌ها';
                
                actions.innerHTML = `
                    <button class="btn btn-success" onclick="performRetouchClean()">
                        🧹 شروع پاکسازی Retouch
                    </button>
                    <div class="info-box" style="margin-top:10px;">
                        📁 <b>موارد پاکسازی:</b><br>
                        • فایل‌های export قدیمی<br>
                        • پروژه‌های حذف نشده<br>
                        • داده‌های کش<br>
                        • preview های اضافی
                    </div>
                `;
            }
        }
        
        function performIbisPaintClean() {
            showToast('🧹 در حال پاکسازی iBisPaint X...');
            
            // پاکسازی کش و localStorage مربوطه
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.toLowerCase().includes('ibis') || key.toLowerCase().includes('paint')) {
                    keysToRemove.push(key);
                }
            }
            keysToRemove.forEach(key => localStorage.removeItem(key));
            
            // پاکسازی cache
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => {
                        if (name.toLowerCase().includes('ibis')) {
                            caches.delete(name);
                        }
                    });
                });
            }
            
            setTimeout(() => {
                showToast('✅ iBisPaint X با موفقیت پاکسازی شد');
                document.getElementById('cleanerInfo').innerHTML = '✅ <b>پاکسازی کامل شد!</b><br>فایل‌های موقت و کش حذف شدند';
            }, 1500);
        }
        
        function performRetouchClean() {
            showToast('🧹 در حال پاکسازی Retouch...');
            
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.toLowerCase().includes('retouch') || key.toLowerCase().includes('touch')) {
                    keysToRemove.push(key);
                }
            }
            keysToRemove.forEach(key => localStorage.removeItem(key));
            
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => {
                        if (name.toLowerCase().includes('retouch')) {
                            caches.delete(name);
                        }
                    });
                });
            }
            
            setTimeout(() => {
                showToast('✅ Retouch با موفقیت پاکسازی شد');
                document.getElementById('cleanerInfo').innerHTML = '✅ <b>بهینه‌سازی کامل شد!</b><br>داده‌های غیرضروری حذف شدند';
            }, 1500);
        }

        // ============================================
        // ابزار ۴: بهبود کیفیت عکس
        // ============================================
        
        let enhanceFile = null;
        
        function openEnhanceTool() {
            enhanceFile = null;
            document.getElementById('modalContent').innerHTML = `
                <h2 style="color:#ffcc00;margin-bottom:15px;">✨ بهبود کیفیت عکس</h2>
                
                <div class="info-box">
                    💡 عکس شما روشن‌تر، شفاف‌تر و با کیفیت‌تر می‌شود
                </div>
                
                <div class="preview-area" id="enhancePreview">
                    <span style="color:#777;">عکسی انتخاب نشده</span>
                </div>
                
                <div class="status-text" id="enhanceStatus">یک عکس انتخاب کنید</div>
                
                <div class="slider-container">
                    <span>کم</span>
                    <input type="range" id="enhanceLevel" min="1" max="10" value="5">
                    <span>زیاد</span>
                </div>
                <div style="text-align:center;font-size:12px;color:#aaa;">میزان بهبود: <span id="enhanceValue">5</span>/10</div>
                
                <input type="file" id="enhanceInput" accept="image/*" style="display:none;">
                
                <button class="btn btn-primary" onclick="document.getElementById('enhanceInput').click()">
                    📂 انتخاب عکس
                </button>
                
                <button class="btn btn-success" id="enhanceBtn" disabled onclick="enhanceImage()">
                    ✨ بهبود کیفیت
                </button>
                
                <div id="enhanceResult"></div>
                
                <button class="btn btn-outline" id="enhanceDownload" disabled onclick="downloadEnhanced()">
                    💾 ذخیره عکس بهبود یافته
                </button>
            `;
            
            document.getElementById('toolModal').classList.add('show');
            
            document.getElementById('enhanceInput').addEventListener('change', handleEnhanceFile);
            document.getElementById('enhanceLevel').addEventListener('input', function() {
                document.getElementById('enhanceValue').textContent = this.value;
            });
        }
        
        function handleEnhanceFile(e) {
            if (e.target.files.length === 0) return;
            enhanceFile = e.target.files[0];
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('enhancePreview').innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:10px;">`;
            };
            reader.readAsDataURL(enhanceFile);
            
            document.getElementById('enhanceBtn').disabled = false;
            document.getElementById('enhanceStatus').textContent = 'عکس آماده بهبود است';
        }
        
        async function enhanceImage() {
            if (!enhanceFile) return;
            
            const btn = document.getElementById('enhanceBtn');
            btn.disabled = true;
            document.getElementById('enhanceStatus').textContent = '⏳ در حال بهبود کیفیت...';
            
            try {
                const level = parseInt(document.getElementById('enhanceLevel').value);
                const imgData = await readFileAsDataURL(enhanceFile);
                const img = await loadImage(imgData);
                
                const canvas = document.getElementById('hiddenCanvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                
                // رسم عکس اصلی
                ctx.drawImage(img, 0, 0);
                
                // اعمال فیلترهای بهبود
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                const brightness = 1 + (level * 0.05);
                const contrast = 1 + (level * 0.08);
                const saturation = 1 + (level * 0.06);
                
                for (let i = 0; i < data.length; i += 4) {
                    // افزایش روشنایی
                    data[i] = Math.min(255, data[i] * brightness);
                    data[i+1] = Math.min(255, data[i+1] * brightness);
                    data[i+2] = Math.min(255, data[i+2] * brightness);
                    
                    // افزایش کنتراست
                    for (let j = 0; j < 3; j++) {
                        data[i+j] = ((data[i+j] / 255 - 0.5) * contrast + 0.5) * 255;
                        data[i+j] = Math.max(0, Math.min(255, data[i+j]));
                    }
                    
                    // افزایش اشباع
                    const gray = 0.2989 * data[i] + 0.5870 * data[i+1] + 0.1140 * data[i+2];
                    data[i] = Math.min(255, gray + saturation * (data[i] - gray));
                    data[i+1] = Math.min(255, gray + saturation * (data[i+1] - gray));
                    data[i+2] = Math.min(255, gray + saturation * (data[i+2] - gray));
                }
                
                ctx.putImageData(imageData, 0, 0);
                
                // نمایش نتیجه
                const enhancedUrl = canvas.toDataURL('image/jpeg', 0.95);
                window.enhancedBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
                
                document.getElementById('enhanceResult').innerHTML = `
                    <div class="comparison-container">
                        <div class="comparison-item">
                            <img src="${imgData}" alt="قبل">
                            <p>📷 قبل</p>
                        </div>
                        <div class="comparison-item">
                            <img src="${enhancedUrl}" alt="بعد">
                            <p>✨ بعد</p>
                        </div>
                    </div>
                `;
                
                document.getElementById('enhanceStatus').textContent = '✅ کیفیت بهبود یافت!';
                document.getElementById('enhanceDownload').disabled = false;
                btn.disabled = false;
                
            } catch (error) {
                document.getElementById('enhanceStatus').textContent = '❌ خطا: ' + error.message;
                btn.disabled = false;
            }
        }
        
        function downloadEnhanced() {
            if (!window.enhancedBlob) return;
            const url = URL.createObjectURL(window.enhancedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `enhanced_${Date.now()}.jpg`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 عکس بهبود یافته ذخیره شد');
        }

        // ============================================
        // توابع کمکی
        // ============================================
        
        function getImageData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const buffer = e.target.result;
                    const arr = new Uint8Array(buffer);
                    
                    if (file.type === 'image/jpeg' || file.name.match(/\.jpe?g$/i)) {
                        try {
                            const raw = jpeg.decode(arr, { useTArray: true });
                            resolve({
                                data: raw.data,
                                width: raw.width,
                                height: raw.height,
                                type: 'jpeg'
                            });
                        } catch (err) {
                            reject(new Error('Decode error: ' + err.message));
                        }
                    } else {
                        const blob = new Blob([arr], { type: file.type });
                        const url = URL.createObjectURL(blob);
                        const img = new Image();
                        img.onload = () => {
                            URL.revokeObjectURL(url);
                            const c = document.createElement('canvas');
                            c.width = img.width;
                            c.height = img.height;
                            const cx = c.getContext('2d');
                            cx.drawImage(img, 0, 0);
                            resolve({
                                data: cx.getImageData(0, 0, c.width, c.height).data,
                                width: c.width,
                                height: c.height,
                                type: 'other'
                            });
                        };
                        img.onerror = () => reject(new Error('Load error'));
                        img.src = url;
                    }
                };
                reader.onerror = () => reject(new Error('Read error'));
                reader.readAsArrayBuffer(file);
            });
        }
        
        function createImageFromData(imgData) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = imgData.width;
                canvas.height = imgData.height;
                const ctx = canvas.getContext('2d');
                const imageData = ctx.createImageData(imgData.width, imgData.height);
                imageData.data.set(imgData.data);
                ctx.putImageData(imageData, 0, 0);
                
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = canvas.toDataURL();
            });
        }
        
        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }
        
        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        // بستن مودال با کلیک خارج
        document.getElementById('toolModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
