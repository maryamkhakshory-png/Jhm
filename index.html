<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>تصویریار - ۱۵ ابزار حرفه‌ای پردازش تصویر</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.0/dist/tesseract.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js">
    </script>

    <style>
        :root {
            --bg: #0a0a1a;
            --bg2: #14142a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text: #e0e0f0;
            --text2: #9999b0;
            --accent: #6c5ce7;
            --accent2: #a855f7;
            --green: #00b894;
            --red: #ff6b6b;
            --yellow: #fdcb6e;
            --radius: 14px;
            --radius2: 22px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Tahoma', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: 8px 10px 30px;
            min-height: 100vh;
        }
        .page {
            display: none;
            animation: fadeScale 0.3s ease;
            padding-bottom: 20px;
        }
        .page.active {
            display: block;
        }

        /* Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius2);
            padding: 18px;
            margin: 12px 0;
            text-align: center;
        }
        .header .logo {
            font-size: 44px;
            animation: pulse 3s infinite;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 4px 0;
        }
        .header .sub {
            font-size: 12px;
            color: var(--text2);
        }

        /* Toolbar */
        .toolbar {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 8px;
            z-index: 100;
        }
        .toolbar .back {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar .title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        /* Search & Categories */
        .search {
            margin: 10px 0;
        }
        .search input {
            width: 100%;
            padding: 12px 18px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }
        .cats {
            display: flex;
            gap: 7px;
            margin: 10px 0;
            overflow-x: auto;
            padding: 2px 0;
        }
        .cats::-webkit-scrollbar {
            height: 0;
        }
        .cat-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text2);
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: 0.2s;
        }
        .cat-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 7px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .stat {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 11px;
            color: var(--text2);
            cursor: pointer;
        }

        /* Tools Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 14px 0;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            animation: fadeUp 0.4s ease backwards;
        }
        .card:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }
        .card .icon {
            font-size: 34px;
            margin-bottom: 8px;
        }
        .card .name {
            font-size: 13px;
            font-weight: 600;
        }
        .card .desc {
            font-size: 11px;
            color: var(--text2);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.45;
            pointer-events: none;
        }
        .btn-p {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }
        .btn-s {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
        }
        .btn-o {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 12px;
            width: auto;
            display: inline-flex;
        }

        /* Inputs */
        .inp {
            margin: 10px 0;
        }
        .inp label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 5px;
        }
        .inp input,
        .inp select,
        .inp textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .inp input:focus,
        .inp select:focus,
        .inp textarea:focus {
            border-color: var(--accent);
        }

        /* Range */
        .rng {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .rng input[type=range] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            -webkit-appearance: none;
            outline: none;
        }
        .rng input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .rng .val {
            min-width: 45px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        /* Preview */
        .prev {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin: 10px 0;
            min-height: 90px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            align-items: center;
            max-height: 280px;
            overflow-y: auto;
        }
        .prev img {
            height: 70px;
            border-radius: 8px;
            border: 2px solid var(--border);
            cursor: pointer;
        }

        /* Comparison */
        .comp {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 14px 0;
        }
        .comp div {
            text-align: center;
        }
        .comp img {
            width: 100%;
            border-radius: var(--radius);
            border: 2px solid var(--border);
        }
        .comp .lbl {
            font-size: 11px;
            color: var(--text2);
            margin-top: 4px;
        }

        /* Progress */
        .prog {
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        .prog .bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .ptxt {
            font-size: 12px;
            color: var(--text2);
            text-align: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 22px;
            border-radius: 25px;
            font-size: 13px;
            z-index: 9999;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Cleaner Toolbar (ibisPaint style) */
        .clean-toolbar {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 8px 0;
            position: sticky;
            bottom: 8px;
            z-index: 50;
        }
        .clean-toolbar button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .clean-toolbar button:active {
            background: var(--accent);
            color: #fff;
        }
        .clean-toolbar .active-tool {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .clean-toolbar .brush-preview {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--text);
            flex-shrink: 0;
        }
        .clean-canvas-wrap {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            border: 2px solid var(--border);
            margin: 8px 0;
            background: #111;
            touch-action: none;
            cursor: crosshair;
        }
        .clean-canvas-wrap canvas {
            display: block;
            transform-origin: 0 0;
        }
        .zoom-indicator {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            pointer-events: none;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-box {
            background: var(--bg2);
            border-radius: var(--radius2);
            padding: 20px;
            max-width: 92%;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Color dots */
        .colors {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 8px 0;
        }
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }
        .color-dot.active {
            border-color: #fff;
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.5);
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .grid3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .settings-section {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin: 10px 0;
        }
        .settings-section h3 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        @media (max-width: 360px) {
            .grid {
                gap: 7px;
            }
            .card {
                padding: 14px 8px;
            }
            .card .icon {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="page active" id="page-home"></div>
        <div class="page" id="page-tool"></div>
        <div class="page" id="page-settings"></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal" id="globalModal"><div class="modal-box" id="globalModalContent"></div></div>

    <script src="cordova.js"></script>
    <script>
        // ============================================
        // تصویریار - ۱۵ ابزار حرفه‌ای پردازش تصویر
        // نسخه ۳.۰ - Production Ready
        // ============================================

        // ==================== CONFIG ====================
        const CFG = {
            saveFolder: localStorage.getItem('iy_save') || 'Download',
            quality: parseInt(localStorage.getItem('iy_qual') || '90'),
            theme: localStorage.getItem('iy_theme') || 'dark'
        };

        // ==================== STATE ====================
        const S = {
            page: 'home',
            tool: null,
            history: ['home'],
            stats: JSON.parse(localStorage.getItem('iy_stats') || '{}'),
            recent: JSON.parse(localStorage.getItem('iy_recent') || '[]'),
            listeners: []
        };

        // ==================== UTILS ====================
        const $ = (s, p) => (p || document).querySelector(s);
        const $$ = (s, p) => (p || document).querySelectorAll(s);

        function toast(msg, dur = 2800) {
            const t = $('#toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(window._tt);
            window._tt = setTimeout(() => t.classList.remove('show'), dur);
        }

        function fmtBytes(b) {
            if (!b) return '0 B';
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(2) + ' MB';
        }

        function loadImg(file) {
            return new Promise((resolve) => {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = new Image();
                    img.onload = () => resolve({ img, dataUrl: e.target.result });
                    img.src = e.target.result;
                };
                r.readAsDataURL(file);
            });
        }

        function fileInp(accept = 'image/*', multi = false) {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = accept;
            inp.multiple = multi;
            inp.style.cssText = 'position:fixed;top:-200px;left:-200px;';
            document.body.appendChild(inp);
            setTimeout(() => { if (inp.parentNode) inp.remove(); }, 90000);
            return inp;
        }

        function dataUrlToBlob(dataUrl) {
            const parts = dataUrl.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const bytes = atob(parts[1]);
            const ab = new ArrayBuffer(bytes.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < bytes.length; i++) ia[i] = bytes.charCodeAt(i);
            return new Blob([ab], { type: mime });
        }

        function saveFile(dataUrl, filename, mime = 'image/jpeg') {
            const folder = CFG.saveFolder;
            // Median
            if (typeof median !== 'undefined' && median.file && median.file.save) {
                try { median.file.save({ data: dataUrl, filename, folder });
                    toast('💾 ذخیره شد'); return; } catch (e) {}
            }
            // Cordova
            if (typeof cordova !== 'undefined' && window.requestFileSystem && window.LocalFileSystem) {
                try {
                    window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, (fs) => {
                        fs.root.getDirectory(folder, { create: true }, (dir) => {
                            dir.getFile(filename, { create: true, exclusive: false }, (fe) => {
                                fe.createWriter((w) => {
                                    w.onwriteend = () => { if (window.MediaScanner) window.MediaScanner
                                            .scanFile(fe.toURL(), mime, () => toast('💾 ذخیره شد'));
                                        else toast('💾 ذخیره شد'); };
                                    fetch(dataUrl).then(r => r.blob()).then(b => w.write(b));
                                });
                            });
                        });
                    });
                    return;
                } catch (e) {}
            }
            // Direct
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            setTimeout(() => link.remove(), 100);
            toast('💾 فایل ذخیره شد');
        }

        function saveBlob(blob, filename) {
            if (typeof median !== 'undefined' && median.file && median.file.save) {
                const r = new FileReader();
                r.onload = () => { median.file.save({ data: r.result, filename, folder: CFG.saveFolder });
                    toast('💾 ذخیره شد'); };
                r.readAsDataURL(blob);
                return;
            }
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            toast('💾 ذخیره شد');
        }

        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const mx = Math.max(r, g, b),
                mn = Math.min(r, g, b);
            let h, s, l = (mx + mn) / 2;
            if (mx === mn) h = s = 0;
            else {
                const d = mx - mn;
                s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
                switch (mx) {
                    case r:
                        h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
                        break;
                    case g:
                        h = ((b - r) / d + 2) / 6;
                        break;
                    case b:
                        h = ((r - g) / d + 4) / 6;
                        break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function escapeHtml(s) { const d = document.createElement('div');
            d.textContent = s; return d.innerHTML; }

        // ==================== ROUTER ====================
        function navTo(page, toolId, push = true) {
            S.page = page;
            S.tool = toolId;
            if (push) { S.history.push(page);
                history.pushState({ page, toolId }, ''); }
            $$('.page').forEach(p => p.classList.remove('active'));
            if (page === 'home') {
                $('#page-home').classList.add('active');
                renderHome();
            } else if (page === 'tool' && toolId) {
                $('#page-tool').classList.add('active');
                renderTool(toolId);
            } else if (page === 'settings') {
                $('#page-settings').classList.add('active');
                renderSettings();
            }
            window.scrollTo(0, 0);
        }

        function goBack() {
            if (S.history.length > 1) {
                S.history.pop();
                const prev = S.history[S.history.length - 1];
                if (prev === 'home') navTo('home', null, false);
                else if (prev === 'settings') navTo('settings', null, false);
                else navTo('tool', S.tool, false);
            } else {
                if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
            }
        }

        function handleBack() {
            if (S.page === 'home') { if (navigator.app && navigator.app.exitApp) navigator.app.exitApp(); } else goBack();
        }

        function openTool(id) {
            S.stats[id] = (S.stats[id] || 0) + 1;
            localStorage.setItem('iy_stats', JSON.stringify(S.stats));
            S.recent = [id, ...S.recent.filter(x => x !== id)].slice(0, 5);
            localStorage.setItem('iy_recent', JSON.stringify(S.recent));
            navTo('tool', id, true);
        }

        // ==================== TOOLS DATA ====================
        const TOOLS = [
            { id: 1, icon: '🧩', name: 'چسباندن عکس', desc: 'عمودی و افقی', cat: 'image', fn: 'stitch' },
            { id: 2, icon: '📄', name: 'ساخت PDF', desc: 'تصاویر پیوسته', cat: 'pdf', fn: 'pdf' },
            { id: 3, icon: '🧹', name: 'پاک‌کن عکس', desc: 'مثل ibisPaint', cat: 'image', fn: 'cleaner' },

        // ==================== TOOL 3: CLEANER (ibisPaint Style) ====================
        function cleaner() {
            let cImg = null,
                brushSize = 20,
                brushColor = '#FFFFFF';
            let scale = 1,
                panX = 0,
                panY = 0;
            let isDrawing = false,
                isPanning = false;
            let lastDist = 0,
                lastCX = 0,
                lastCY = 0;
            let history = [],
                histIdx = -1;
            let canvas, ctx, wrapper;
            let brushPreviewVis = false,
                brushPX = 0,
                brushPY = 0;
            let rafId = null;

            $('#toolContent').innerHTML = `
            <div class="clean-canvas-wrap" id="cWrap" style="height:420px">
              <canvas id="cCanvas" style="display:none"></canvas>
              <div class="zoom-indicator" id="cZoom">100%</div>
            </div>
            <div class="rng"><span>سایز قلم:</span><input type="range" id="cSize" min="3" max="100" value="20" oninput="brushSize=parseInt(this.value);$('#cSizeV').textContent=this.value;updateBrushPrev()"><span class="val" id="cSizeV">20</span></div>
            <div class="colors" id="cColors">
              <div class="color-dot active" style="background:#FFF" data-c="#FFFFFF" onclick="selCC(this)"></div>
              <div class="color-dot" style="background:#000" data-c="#000000" onclick="selCC(this)"></div>
              <div class="color-dot" style="background:#888" data-c="#888888" onclick="selCC(this)"></div>
              <div class="color-dot" style="background:#F5DEB3" data-c="#F5DEB3" onclick="selCC(this)"></div>
              <div class="color-dot" style="background:#C8E6C9" data-c="#C8E6C9" onclick="selCC(this)"></div>
              <div class="color-dot" style="background:#E8E8E8" data-c="#E8E8E8" onclick="selCC(this)"></div>
            </div>
            <div class="clean-toolbar">
              <button onclick="undoC()" id="cUndo" disabled>↩️</button>
              <button onclick="redoC()" id="cRedo" disabled>↪️</button>
              <button onclick="zoomIn()">🔍+</button>
              <button onclick="zoomOut()">🔍−</button>
              <button onclick="fitScreen()">📐</button>
              <button onclick="actualSize()">1:1</button>
            </div>
            <button class="btn btn-p" onclick="selCI()">📂 انتخاب عکس</button>
            <button class="btn btn-s" id="cSave" disabled onclick="saveCleaned()">💾 ذخیره</button>`;

            canvas = $('#cCanvas');
            ctx = canvas.getContext('2d');
            wrapper = $('#cWrap');

            window.selCC = (dot) => { $$('#cColors .color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                brushColor = dot.dataset.c;
                updateBrushPrev(); };

            window.selCI = () => { const inp = fileInp();
                inp.onchange = (e) => { const f = e.target.files[0]; if (!f) return;
                    const r = new FileReader();
                    r.onload = (ev) => { const img = new Image();
                        img.onload = () => { cImg = img;
                            canvas.style.display = 'block';
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            history = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
                            histIdx = 0;
                            $('#cSave').disabled = false;
                            $('#cUndo').disabled = false;
                            fitScreen(); };
                        img.src = ev.target.result; };
                    r.readAsDataURL(f); };
                inp.click(); };

            function updateTransform() {
                canvas.style.transform = `matrix(${scale},0,0,${scale},${panX},${panY})`;
                $('#cZoom').textContent = Math.round(scale * 100) + '%';
                updateBrushPrev();
            }

            function updateBrushPrev() { if (brushPreviewVis) { drawBrushPreview(
                brushPX, brushPY); } }

            function drawBrushPreview(cx, cy) {
                const wrapperRect = wrapper.getBoundingClientRect();
                const canvasX = (cx - wrapperRect.left - panX) / scale;
                const canvasY = (cy - wrapperRect.top - panY) / scale;
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(cImg, 0, 0);
                const overlay = document.createElement('canvas');
                overlay.width = canvas.width;
                overlay.height = canvas.height;
                const ovCtx = overlay.getContext('2d');
                ovCtx.drawImage(cImg, 0, 0);
                for (let i = 1; i <= histIdx; i++) { ovCtx.putImageData(history[i], 0, 0); }
                ctx.drawImage(overlay, 0, 0);
                ctx.restore();
                updateTransform();
                const px = canvasX * scale + panX + wrapperRect.left;
                const py = canvasY * scale + panY + wrapperRect.top;
                const div = document.createElement('div');
                div.style.cssText =
                    `position:fixed;pointer-events:none;border:2px dashed ${brushColor};border-radius:50%;width:${brushSize*scale}px;height:${brushSize*scale}px;left:${px-brushSize*scale/2}px;top:${py-brushSize*scale/2}px;z-index:999`;
                div.id = 'brushPrev';
                const old = $('#brushPrev');
                if (old) old.remove();
                document.body.appendChild(div);
            }

            function getCanvasPos(e) {
                const rect = wrapper.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (cx - rect.left - panX) / scale,
                    y: (cy - rect.top - panY) / scale,
                    rawX: cx,
                    rawY: cy
                };
            }

            wrapper.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'pen' || e.pointerType === 'touch' || e.pointerType ===
                    'mouse') {
                    if (e.isPrimary === false) return;
                    isDrawing = true;
                    brushPreviewVis = true;
                    const pos = getCanvasPos(e);
                    brushPX = pos.rawX;
                    brushPY = pos.rawY;
                    drawAt(pos);
                    e.preventDefault();
                }
            });

            wrapper.addEventListener('pointermove', (e) => {
                if (isDrawing && (e.pointerType === 'pen' || e.pointerType === 'touch' || e
                        .pointerType === 'mouse')) {
                    const pos = getCanvasPos(e);
                    brushPX = pos.rawX;
                    brushPY = pos.rawY;
                    drawAt(pos);
                    e.preventDefault();
                } else if (!isDrawing) {
                    const pos = getCanvasPos(e);
                    brushPX = pos.rawX;
                    brushPY = pos.rawY;
                    brushPreviewVis = true;
                    drawBrushPreview(pos.rawX, pos.rawY);
                }
            });

            wrapper.addEventListener('pointerup', () => {
                if (isDrawing) {
                    saveState();
                    isDrawing = false;
                    brushPreviewVis = false;
                    const old = $('#brushPrev');
                    if (old) old.remove();
                    redrawCanvas();
                }
            });

            wrapper.addEventListener('pointerleave', () => {
                if (isDrawing) { saveState();
                    isDrawing = false; }
                brushPreviewVis = false;
                const old = $('#brushPrev');
                if (old) old.remove();
                redrawCanvas();
            });

            // Pinch zoom
            wrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    isPanning = true;
                    isDrawing = false;
                    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0]
                        .clientY - e.touches[1].clientY);
                    lastCX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    lastCY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                }
            }, { passive: false });

            wrapper.addEventListener('touchmove', (e) => {
                if (isPanning && e.touches.length === 2) {
                    const rect = wrapper.getBoundingClientRect();
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0]
                        .clientY - e.touches[1].clientY);
                    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    const oldScale = scale;
                    scale *= dist / lastDist;
                    scale = Math.min(10, Math.max(0.1, scale));
                    panX = cx - rect.left - (cx - rect.left - panX) * (scale / oldScale);
                    panY = cy - rect.top - (cy - rect.top - panY) * (scale / oldScale);
                    lastDist = dist;
                    lastCX = cx;
                    lastCY = cy;
                    updateTransform();
                    redrawCanvas();
                }
                e.preventDefault();
            }, { passive: false });

            wrapper.addEventListener('touchend', () => { isPanning = false;
                lastDist = 0; });

            function drawAt(pos) {
                if (!cImg) return;
                const overlay = document.createElement('canvas');
                overlay.width = canvas.width;
                overlay.height = canvas.height;
                const ovCtx = overlay.getContext('2d');
                ovCtx.drawImage(cImg, 0, 0);
                for (let i = 1; i <= histIdx; i++) { ovCtx.putImageData(history[i], 0, 0); }
                ovCtx.fillStyle = brushColor;
                ovCtx.beginPath();
                ovCtx.arc(pos.x, pos.y, brushSize / 2 / scale, 0, Math.PI * 2);
                ovCtx.fill();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(overlay, 0, 0);
                updateTransform();
            }

            function redrawCanvas() {
                if (!cImg) return;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(cImg, 0, 0);
                for (let i = 1; i <= histIdx; i++) { ctx.putImageData(history[i], 0, 0); }
                updateTransform();
            }

            function saveState() {
                history = history.slice(0, histIdx + 1);
                history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                histIdx++;
                if (history.length > 50) { history.shift();
                    histIdx--; }
                $('#cRedo').disabled = true;
                $('#cUndo').disabled = false;
            }

            window.undoC = () => { if (histIdx > 0) { histIdx--;
                    redrawCanvas();
                    $('#cRedo').disabled = false; if (histIdx === 0) $('#cUndo').disabled = true; } };
            window.redoC = () => { if (histIdx < history.length - 1) { histIdx++;
                    redrawCanvas();
                    $('#cUndo').disabled = false; if (histIdx >= history.length - 1) $('#cRedo').disabled =
                    true; } };
            window.zoomIn = () => { scale = Math.min(10, scale * 1.3);
                updateTransform();
                redrawCanvas(); };
            window.zoomOut = () => { scale = Math.max(0.1, scale / 1.3);
                updateTransform();
                redrawCanvas(); };
            window.fitScreen = () => { if (!cImg) return;
                const rect = wrapper.getBoundingClientRect();
                scale = Math.min((rect.width - 20) / cImg.width, (rect.height - 20) / cImg.height);
                panX = 0;
                panY = 0;
                updateTransform();
                redrawCanvas(); };
            window.actualSize = () => { scale = 1;
                panX = 0;
                panY = 0;
                updateTransform();
                redrawCanvas(); };
            window.saveCleaned = () => { if (!canvas) return;
                redrawCanvas();
                const dataUrl = canvas.toDataURL('image/jpeg', CFG.quality / 100);
                saveFile(dataUrl, 'cleaned_' + Date.now() + '.jpg'); };
        }

            $('#toolContent').innerHTML = `
            <button class="btn btn-p" onclick="selOCR()">📂 انتخاب عکس</button>
            <div class="prog" id="ocrProg" style="display:none"><div class="bar" id="ocrBar"></div></div>
            <div class="ptxt" id="ocrPTxt" style="display:none"></div>
            <div id="ocrRes"></div>
            <div class="grid2"><button class="btn btn-o btn-sm" id="ocrCopy" disabled onclick="copyOCR()">📋 کپی</button><button class="btn btn-o btn-sm" id="ocrSave" disabled onclick="saveOCR()">💾 TXT</button></div>`;

            window.selOCR = () => { const inp = fileInp();
                inp.onchange = async (e) => { const f = e.target.files[0]; if (!f) return;
                    $('#ocrProg').style.display = 'block';
                    $('#ocrPTxt').style.display = 'block'; try { const worker = await Tesseract.createWorker();
                        await worker.loadLanguage('eng+fas');
                        await worker.initialize('eng+fas');
                        const { data: { text } } = await worker.recognize(f);
                        await worker.terminate();
                        window._ocrText = text.trim() || 'متنی پیدا نشد';
                        $('#ocrRes').innerHTML =
                            `<textarea id="ocrTA" style="width:100%;min-height:180px;background:var(--glass);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:14px;resize:vertical">${escapeHtml(window._ocrText)}</textarea>`;
                        $('#ocrCopy').disabled = false;
                        $('#ocrSave').disabled = false;
                        $('#ocrProg').style.display = 'none';
                        $('#ocrPTxt').style.display = 'none';
                        toast('✅ متن استخراج شد'); } catch (e) { toast('❌ خطا در OCR');
                        $('#ocrProg').style.display = 'none';
                        $('#ocrPTxt').style.display = 'none'; } };
                inp.click(); };
            window.copyOCR = () => { const t = $('#ocrTA')?.value || window._ocrText; if (t) navigator.clipboard.writeText(
                    t).then(() => toast('📋 کپی شد')); };
            window.saveOCR = () => { const t = $('#ocrTA')?.value || window._ocrText; if (t) saveBlob(new Blob([t], { type: 'text/plain' }),
                    'ocr_' + Date.now() + '.txt'); };
        }

        // ==================== TOOL 13: COLOR PICKER ====================
        function colorpick() {
            $('#toolContent').innerHTML = `
            <button class="btn btn-p" onclick="selCP()">📂 انتخاب عکس</button>
            <canvas id="cpCanvas" style="display:none;max-width:100%;cursor:crosshair;border-radius:10px"></canvas>
            <div id="cpInfo" style="text-align:center;margin:10px 0"></div>
            <div class="grid3"><button class="btn btn-o btn-sm" id="cpHex" disabled onclick="cpCopy('hex')">📋 HEX</button><button class="btn btn-o btn-sm" id="cpRgb" disabled onclick="cpCopy('rgb')">📋 RGB</button><button class="btn btn-o btn-sm" id="cpHsl" disabled onclick="cpCopy('hsl')">📋 HSL</button></div>`;

            window.selCP = () => { const inp = fileInp();
                inp.onchange = (e) => { const f = e.target.files[0]; if (!f) return;
                    const r = new FileReader();
                    r.onload = (ev) => { const img = new Image();
                        img.onload = () => { const canvas = $('#cpCanvas');
                            canvas.style.display = 'block';
                            const mw = Math.min(img.width, 350);
                            const s = mw / img.width;
                            canvas.width = mw;
                            canvas.height = img.height * s;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            canvas.onclick = (e2) => { const rect = canvas.getBoundingClientRect();
                                const x = Math.floor((e2.clientX - rect.left) * (canvas.width /
                                    rect.width));
                                const y = Math.floor((e2.clientY - rect.top) * (canvas.height /
                                    rect.height));
                                const px = ctx.getImageData(x, y, 1, 1).data;
                                const [r, g, b] = px;
                                const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(
                                    2, '0')).join('');
                                const hsl = rgbToHsl(r, g, b);
                                $('#cpInfo').innerHTML =
                                    `<div style="width:60px;height:60px;background:${hex};border-radius:15px;margin:0 auto;border:3px solid #fff;box-shadow:0 0 20px ${hex}44"></div><p style="margin-top:8px"><b>HEX:</b> ${hex}</p><p><b>RGB:</b> (${r},${g},${b})</p><p><b>HSL:</b> (${hsl.h}°,${hsl.s}%,${hsl.l}%)</p>`;
                                window._cp = { hex, rgb: `rgb(${r},${g},${b})`,
                                    hsl: `hsl(${hsl.h},${hsl.s}%,${hsl.l}%)` };
                                $('#cpHex').disabled = false;
                                $('#cpRgb').disabled = false;
                                $('#cpHsl').disabled = false; }; };
                        img.src = ev.target.result; };
                    r.readAsDataURL(f); };
                inp.click(); };
            window.cpCopy = (type) => { if (window._cp && window._cp[type]) navigator.clipboard.writeText(window._cp[type])
                    .then(() => toast('📋 کپی شد')); };
        }

        // ==================== TOOL 14: SCREEN STITCH (Auto Overlap) ====================
        function screenstitch() {
            $('#toolContent').innerHTML = `
            <button class="btn btn-p" onclick="selSS()">📂 انتخاب اسکرین‌شات‌ها</button>
            <button class="btn btn-s" onclick="doSS()">🖼️ چسباندن هوشمند</button>
            <div id="ssRes"></div>
            <button class="btn btn-o" id="ssSave" disabled onclick="saveFile(window._ssRes,'screen_stitch_'+Date.now()+'.jpg')">💾 ذخیره</button>`;

            window.selSS = () => { const inp = fileInp('image/*', true);
                inp.onchange = (e) => { window._ssFiles = Array.from(e.target.files).filter(f => f.type.startsWith(
                        'image/')); if (window._ssFiles.length < 2) { toast('⚠️ حداقل ۲ عکس'); return; }
                    toast('✅ ' + window._ssFiles.length + ' عکس'); };
                inp.click(); };
            window.doSS = async () => { if (!window._ssFiles || window._ssFiles.length < 2) { toast('⚠️ حداقل ۲ عکس انتخاب کن'); return; }
                const imgs = [];
                for (let f of window._ssFiles) { const { img } = await loadImg(f);
                    imgs.push(img); }
                // Auto-detect overlap
                const overlaps = [0];
                for (let i = 1; i < imgs.length; i++) {
                    const prev = imgs[i - 1];
                    const curr = imgs[i];
                    const c1 = document.createElement('canvas');
                    c1.width = prev.width;
                    c1.height = prev.height;
                    c1.getContext('2d').drawImage(prev, 0, 0);
                    const c2 = document.createElement('canvas');
                    c2.width = curr.width;
                    c2.height = curr.height;
                    c2.getContext('2d').drawImage(curr, 0, 0);
                    const h = Math.min(prev.height, curr.height);
                    let bestOverlap = 0,
                        bestScore = Infinity;
                    for (let o = 10; o < h; o += 5) {
                        let score = 0;
                        const d1 = c1.getContext('2d').getImageData(0, prev.height - o, prev.width, Math.min(o, 30));
                        const d2 = c2.getContext('2d').getImageData(0, 0, curr.width, Math.min(o, 30));
                        const len = Math.min(d1.data.length, d2.data.length);
                        for (let j = 0; j < len; j += 4) score += Math.abs(d1.data[j] - d2.data[j]);
                        if (score < bestScore) { bestScore = score;
                            bestOverlap = o; }
                    }
                    overlaps.push(bestOverlap || 60);
                }
                let totalH = imgs[0].height;
                for (let i = 1; i < imgs.length; i++) totalH += imgs[i].height - overlaps[i];
                const c = document.createElement('canvas');
                c.width = imgs[0].width;
                c.height = totalH;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#FFF';
                ctx.fillRect(0, 0, c.width, totalH);
                let y = 0;
                for (let i = 0; i < imgs.length; i++) { ctx.drawImage(imgs[i], 0, y); if (i < imgs.length - 1) y += imgs[
                        i].height - overlaps[i + 1];
                    else y += imgs[i].height; }
                window._ssRes = c.toDataURL('image/jpeg', CFG.quality / 100);
                $('#ssRes').innerHTML = `<img src="${window._ssRes}" style="width:100%;border-radius:10px">`;
                $('#ssSave').disabled = false;
                toast('✅ چسباندن هوشمند انجام شد'); };
        }

        // ==================== TOOL 15: BATCH ====================
        function batch() {
            $('#toolContent').innerHTML = `
            <div class="inp"><label>عملیات:</label><select id="bOp"><option value="compress">📦 فشرده‌سازی</option><option value="resize">📐 تغییر سایز (800px)</option><option value="watermark">💧 واترمارک</option><option value="convert">🔄 تبدیل به JPG</option></select></div>
            <button class="btn btn-p" onclick="selB()">📂 انتخاب تصاویر</button>
            <button class="btn btn-s" id="bBtn" disabled onclick="doB()">📋 اجرا</button>
            <div class="prog" id="bProg" style="display:none"><div class="bar" id="bBar"></div></div>
            <div class="ptxt" id="bPTxt" style="display:none"></div>
            <div id="bRes"></div>
            <button class="btn btn-o" id="bZip" disabled onclick="downloadBZip()">📦 دانلود ZIP</button>`;

            window.selB = () => { const inp = fileInp('image/*', true);
                inp.onchange = (e) => { window._bFiles = Array.from(e.target.files).filter(f => f.type.startsWith(
                        'image/'));
                    $('#bBtn').disabled = !window._bFiles.length;
                    toast('✅ ' + (window._bFiles?.length || 0) + ' عکس'); };
                inp.click(); };
            window.doB = async () => { if (!window._bFiles?.length) { toast('⚠️ عکس انتخاب کن'); return; }
                const op = $('#bOp').value;
                $('#bProg').style.display = 'block';
                $('#bPTxt').style.display = 'block';
                window._bResults = [];
                $('#bRes').innerHTML = ''; for (let i = 0; i < window._bFiles.length; i++) { const { img } =
                        await loadImg(window._bFiles[i]);
                    const c = document.createElement('canvas'); if (op === 'resize') { const r = 800 / img.width;
                        c.width = 800;
                        c.height = Math.round(img.height * r); } else { c.width = img.width;
                        c.height = img.height; }
                    const ctx = c.getContext('2d');
                    ctx.drawImage(img, 0, 0, c.width, c.height); if (op === 'watermark') { ctx.globalAlpha = 0.4;
                        ctx.font = 'bold 30px Arial';
                        ctx.fillStyle = '#FFF';
                        ctx.textAlign = 'center';
                        ctx.fillText('©', c.width / 2, c.height / 2); }
                    const q = op === 'compress' ? 0.5 : CFG.quality / 100;
                    const dataUrl = c.toDataURL('image/jpeg', q);
                    window._bResults.push({ dataUrl, blob: dataUrlToBlob(dataUrl), name: `batch_${i+1}.jpg` });
                    $('#bRes').innerHTML +=
                        `<img src="${dataUrl}" style="width:48%;margin:1%;border-radius:8px;display:inline-block">`;
                    $('#bBar').style.width = ((i + 1) / window._bFiles.length * 100) + '%';
                    $('#bPTxt').textContent = `${i+1} از ${window._bFiles.length}`;
                    await new Promise(r => setTimeout(r, 200)); }
                $('#bProg').style.display = 'none';
                $('#bPTxt').style.display = 'none';
                $('#bZip').disabled = false;
                toast('✅ پردازش گروهی کامل شد'); };
            window.downloadBZip = async () => { if (!window._bResults?.length) return;
                const zip = new JSZip();
                window._bResults.forEach(r => zip.file(r.name, r.blob));
                const zblob = await zip.generateAsync({ type: 'blob' });
                saveBlob(zblob, 'batch_' + Date.now() + '.zip'); };
        }

        // ==================== INIT ====================
        function init() {
            renderHome();
            window.addEventListener('popstate', (e) => {
                if (e.state && e.state.page === 'tool') navTo('tool', e.state.toolId, false);
                else if (e.state && e.state.page === 'settings') navTo('settings', null, false);
                else navTo('home', null, false);
            });
            document.addEventListener('backbutton', handleBack, false);
        }

        document.addEventListener('DOMContentLoaded', init);
        if (typeof cordova !== 'undefined') document.addEventListener('deviceready', init, false);
    </script>
</body>
